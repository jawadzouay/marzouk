<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>إرسال العملاء — مرزوق أكاديمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f0f4f8; min-height: 100vh; }
    header { background: #e63329; color: white; padding: 14px 20px; padding-top: max(14px,env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    header h1 { font-size: 17px; font-weight: 700; }
    .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 8px; font-family: 'Cairo', sans-serif; cursor: pointer; font-size: 13px; }
    .container { padding: 16px; max-width: 900px; margin: 0 auto; padding-bottom: max(24px, env(safe-area-inset-bottom)); }

    /* Upload zone */
    .upload-zone {
      background: white; border: 3px dashed #93c5fd; border-radius: 16px;
      padding: 32px 20px; text-align: center; cursor: pointer; margin-bottom: 14px;
      transition: background 0.2s; position: relative;
    }
    .upload-zone:hover { background: #eff6ff; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-zone .icon { font-size: 44px; }
    .upload-zone p { color: #6b7280; margin-top: 10px; font-size: 14px; }
    .upload-zone strong { color: #e63329; }

    /* Image previews */
    .previews-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .preview-item {
      position: relative; width: 80px; height: 80px; border-radius: 8px;
      overflow: hidden; border: 2px solid #e5e7eb;
    }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .remove-img {
      position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,0.6);
      color: white; border: none; border-radius: 4px; width: 18px; height: 18px;
      font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .preview-item .img-status {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.6); color: white; font-size: 9px;
      text-align: center; padding: 2px;
    }

    /* Progress */
    .extract-progress { background: white; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: #374151; }
    .progress-bar-bg { background: #e5e7eb; border-radius: 99px; height: 8px; overflow: hidden; margin-top: 8px; }
    .progress-bar-fill { height: 100%; border-radius: 99px; background: #e63329; transition: width 0.4s; }

    /* Buttons */
    .btn { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 15px; font-family: 'Cairo', sans-serif; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
    .btn-primary   { background: #e63329; color: white; }
    .btn-success   { background: #10b981; color: white; }
    .btn-secondary { background: #6b7280; color: white; }
    .btn:disabled  { opacity: 0.5; cursor: not-allowed; }

    /* Table */
    .table-wrap { overflow-x: auto; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; min-width: 500px; }
    th { background: #e63329; color: white; padding: 10px 12px; font-size: 13px; }
    td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    .phone-input { border: 2px solid #e5e7eb; border-radius: 6px; padding: 5px 8px; font-family: 'Cairo', sans-serif; font-size: 13px; width: 130px; direction: ltr; }
    .phone-invalid { border-color: #ef4444; background: #fef2f2; }
    .status-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .s-rdv{background:#E2EFDA;color:#2d6a4f} .s-bv{background:#FFF2CC;color:#7d6608}
    .s-nr{background:#FCE4D6;color:#9c2a10} .s-pi{background:#F2CEEF;color:#6d1f6b}
    .s-av{background:#DDEBF7;color:#154360}
    .delete-btn { background: #fef2f2; color: #dc2626; border: none; border-radius: 6px; padding: 5px 8px; cursor: pointer; font-size: 11px; }
    .src-badge { font-size: 10px; color: #9ca3af; }

    /* Submission counter */
    .sub-counter {
      border-radius: 12px; padding: 12px 16px; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 14px; font-weight: 700;
    }
    .sub-counter.ok   { background: #dcfce7; color: #166534; }
    .sub-counter.warn { background: #fef3c7; color: #92400e; }
    .sub-counter.full { background: #fef2f2; color: #dc2626; }
    .sub-dots { display: flex; gap: 6px; }
    .sub-dot { width: 14px; height: 14px; border-radius: 50%; background: #e5e7eb; }
    .sub-dot.used { background: currentColor; }

    /* Alerts */
    .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 12px; font-size: 14px; }
    .alert-success { background: #dcfce7; color: #166534; }
    .alert-error   { background: #fef2f2; color: #dc2626; }
    .alert-warn    { background: #fef3c7; color: #92400e; }

    /* Summary bar */
    .summary-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .summary-chip { background: white; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  </style>
</head>
<body>
  <header>
    <h1>📋 إرسال قائمة العملاء</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">← رجوع</button>
  </header>

  <div class="container">
    <!-- Submission counter -->
    <div class="sub-counter ok" id="sub-counter" style="display:none">
      <span id="sub-counter-text">جاري التحقق...</span>
      <div class="sub-dots">
        <div class="sub-dot" id="dot-1"></div>
        <div class="sub-dot" id="dot-2"></div>
        <div class="sub-dot" id="dot-3"></div>
      </div>
    </div>

    <!-- Upload zone -->
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(event)" />
      <div class="icon">📸</div>
      <p>اضغط لرفع صورة أو أكثر<br><strong>يمكنك رفع عدة صور في نفس الوقت</strong></p>
    </div>

    <!-- Image previews -->
    <div class="previews-row" id="previews-row"></div>

    <!-- Extract progress -->
    <div class="extract-progress" id="extract-progress" style="display:none">
      <div id="progress-text">جاري المعالجة...</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <button class="btn btn-primary" id="extract-btn" onclick="extractAll()" disabled>
      🤖 استخراج البيانات من كل الصور
    </button>

    <div id="alerts"></div>

    <!-- Results -->
    <div id="table-section" style="display:none">
      <div class="summary-bar" id="summary-bar"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>الهاتف</th><th>الاسم</th><th>المستوى</th><th>المدينة</th><th>الحالة</th><th>المصدر</th><th>حذف</th></tr>
          </thead>
          <tbody id="leads-body"></tbody>
        </table>
      </div>
      <button class="btn btn-success" onclick="submitLeads()">✅ تأكيد الإرسال</button>
      <button class="btn btn-secondary" onclick="resetForm()">🔄 إعادة المحاولة</button>
    </div>
  </div>

  <script>
    const API   = window.location.origin;
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/index.html';

    let selectedFiles   = [];
    let extractedLeads  = [];
    let submissionsToday = 0;
    const statusClass   = { 'RDV':'s-rdv','B.V':'s-bv','N.R':'s-nr','P.I':'s-pi','Autre ville':'s-av' };

    async function checkSubmissionCount() {
      try {
        const res  = await fetch(`${API}/leads/submissions-today`, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        submissionsToday = data.count || 0;
        updateCounter(submissionsToday);
      } catch(e) { /* silent */ }
    }

    function updateCounter(count) {
      const el   = document.getElementById('sub-counter');
      const text = document.getElementById('sub-counter-text');
      el.style.display = 'flex';
      // fill dots
      [1,2,3].forEach(i => {
        document.getElementById(`dot-${i}`).classList.toggle('used', i <= count);
      });
      if (count === 0) {
        el.className = 'sub-counter ok';
        text.textContent = 'لم ترسل بعد اليوم — لديك 3 إرسالات متاحة';
      } else if (count === 1) {
        el.className = 'sub-counter ok';
        text.textContent = 'إرسال 1/3 — لديك إرسالان إضافيان اليوم';
      } else if (count === 2) {
        el.className = 'sub-counter warn';
        text.textContent = '⚠️ إرسال 2/3 — هذا هو آخر إرسال متاح لك اليوم';
      } else {
        el.className = 'sub-counter full';
        text.textContent = '🚫 وصلت للحد الأقصى — 3/3 إرسالات مكتملة اليوم';
        document.getElementById('upload-zone').style.pointerEvents = 'none';
        document.getElementById('upload-zone').style.opacity = '0.4';
        document.getElementById('extract-btn').disabled = true;
      }
    }

    checkSubmissionCount();

    function handleFiles(e) {
      const newFiles = Array.from(e.target.files);
      newFiles.forEach(f => { if (!selectedFiles.find(x=>x.name===f.name&&x.size===f.size)) selectedFiles.push(f); });
      renderPreviews();
      document.getElementById('extract-btn').disabled = selectedFiles.length === 0;
    }

    function renderPreviews() {
      const row = document.getElementById('previews-row');
      row.innerHTML = '';
      selectedFiles.forEach((f, i) => {
        const url = URL.createObjectURL(f);
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.id = `prev-${i}`;
        div.innerHTML = `
          <img src="${url}">
          <button class="remove-img" onclick="removeFile(${i})">✕</button>
          <div class="img-status" id="img-status-${i}">انتظار</div>`;
        row.appendChild(div);
      });
    }

    function removeFile(i) {
      selectedFiles.splice(i, 1);
      renderPreviews();
      document.getElementById('extract-btn').disabled = selectedFiles.length === 0;
    }

    async function extractAll() {
      if (!selectedFiles.length) return;
      const btn = document.getElementById('extract-btn');
      btn.disabled = true;
      document.getElementById('extract-progress').style.display = 'block';
      document.getElementById('alerts').innerHTML = '';
      extractedLeads = [];

      for (let i = 0; i < selectedFiles.length; i++) {
        const f = selectedFiles[i];
        const pct = Math.round(((i) / selectedFiles.length) * 100);
        document.getElementById('progress-text').textContent = `معالجة صورة ${i+1} من ${selectedFiles.length}...`;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById(`img-status-${i}`).textContent = '⏳';

        try {
          const fd = new FormData(); fd.append('file', f);
          let res, attempt = 0;
          while (attempt < 3) {
            res = await fetch(`${API}/leads/extract`, {
              method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: fd
            });
            if (res.status !== 503) break;
            attempt++;
            if (attempt < 3) {
              document.getElementById('progress-text').textContent = `⏳ جاري تشغيل الخادم... إعادة المحاولة ${attempt}/3`;
              await new Promise(r => setTimeout(r, 5000));
            }
          }
          let data;
          try { data = await res.json(); } catch {
            throw new Error('الخادم غير متاح، حاول مرة أخرى بعد لحظة');
          }
          if (!res.ok) throw new Error(data.detail || 'خطأ');
          const leads = (data.leads || []).map(l => ({ ...l, _src: i+1 }));
          extractedLeads.push(...leads);
          document.getElementById(`img-status-${i}`).textContent = `✅ ${leads.length}`;
        } catch(err) {
          document.getElementById(`img-status-${i}`).textContent = '❌';
          showAlert(`خطأ في الصورة ${i+1}: ${err.message}`, 'error');
        }
      }

      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('progress-text').textContent = `تم! ${extractedLeads.length} عميل من ${selectedFiles.length} صورة`;
      renderTable();
      btn.disabled = false;
    }

    function renderTable() {
      const tbody = document.getElementById('leads-body');
      tbody.innerHTML = '';
      document.getElementById('table-section').style.display = 'block';

      // Summary
      const counts = {};
      extractedLeads.forEach(l => { counts[l.status] = (counts[l.status]||0)+1; });
      document.getElementById('summary-bar').innerHTML =
        `<div class="summary-chip">📊 المجموع: ${extractedLeads.length}</div>` +
        Object.entries(counts).map(([s,c])=>`<div class="summary-chip">${s}: ${c}</div>`).join('');

      extractedLeads.forEach((lead, i) => {
        const sc = statusClass[lead.status] || '';
        const invalid = lead.flagged;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i+1}</td>
          <td>
            <input class="phone-input ${invalid?'phone-invalid':''}" value="${lead.phone}"
              onchange="updatePhone(${i},this.value)" oninput="validatePhoneInput(this)" dir="ltr">
            ${invalid?'<div style="color:#ef4444;font-size:10px">رقم غير صحيح</div>':''}
          </td>
          <td>${lead.name||'—'}</td>
          <td>${lead.level||'—'}</td>
          <td>${lead.city||'—'}</td>
          <td><span class="status-badge ${sc}">${lead.status}</span></td>
          <td><span class="src-badge">📷${lead._src||''}</span></td>
          <td><button class="delete-btn" onclick="deleteLead(${i})">🗑️</button></td>`;
        tbody.appendChild(tr);
      });
    }

    function validatePhoneInput(inp) {
      const v = inp.value.replace(/[\s\-]/g,'');
      inp.classList.toggle('phone-invalid', !/^0[67]\d{8}$/.test(v));
    }
    function updatePhone(i, v) {
      extractedLeads[i].phone = v.replace(/[\s\-]/g,'');
      extractedLeads[i].flagged = !/^0[67]\d{8}$/.test(extractedLeads[i].phone);
    }
    function deleteLead(i) { extractedLeads.splice(i,1); renderTable(); }

    async function submitLeads() {
      if (extractedLeads.some(l=>l.flagged)) {
        showAlert('يوجد أرقام غير صحيحة. صحّحها أو احذفها قبل الإرسال.','warn'); return;
      }
      // Warn on the last allowed submission
      if (submissionsToday === 2) {
        const ok = confirm('⚠️ تنبيه: هذا هو آخر إرسال مسموح به اليوم (3/3). هل تريد المتابعة؟');
        if (!ok) return;
      }
      try {
        let res2, attempt2 = 0;
        while (attempt2 < 3) {
          res2 = await fetch(`${API}/leads/submit`,{
            method:'POST',
            headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
            body:JSON.stringify({leads:extractedLeads})
          });
          if (res2.status !== 503) break;
          attempt2++;
          if (attempt2 < 3) await new Promise(r => setTimeout(r, 5000));
        }
        const res = res2;
        let data;
        try { data = await res.json(); } catch {
          throw new Error('الخادم غير متاح، حاول مرة أخرى بعد لحظة');
        }
        if (!res.ok) throw new Error(data.detail||'خطأ في الإرسال');
        let msg = `✅ تم حفظ ${data.saved} عميل.`;
        if (data.skipped?.length) {
          const dups = data.skipped.filter(s=>s.reason==='duplicate').length;
          const blk  = data.skipped.filter(s=>s.reason==='blacklisted').length;
          if (dups) msg += ` ${dups} مكرر تم تجاهله.`;
          if (blk)  msg += ` ${blk} محظور تم تجاهله.`;
        }
        submissionsToday = data.submissions_today || submissionsToday + 1;
        updateCounter(submissionsToday);
        if (data.submissions_remaining > 0) {
          msg += ` — متبقي ${data.submissions_remaining} إرسال اليوم.`;
        }
        showAlert(msg,'success');
        document.getElementById('table-section').style.display='none';
        if (data.sheets_error) {
          setTimeout(() => showAlert(`⚠️ تم الحفظ لكن فشل إرسال البيانات إلى Google Sheet: ${data.sheets_error}`, 'warn'), 500);
        } else {
          setTimeout(()=>window.location.href='dashboard.html',2000);
        }
      } catch(err) { showAlert(err.message,'error'); }
    }

    function resetForm() {
      selectedFiles=[]; extractedLeads=[];
      document.getElementById('file-input').value='';
      document.getElementById('previews-row').innerHTML='';
      document.getElementById('table-section').style.display='none';
      document.getElementById('extract-progress').style.display='none';
      document.getElementById('extract-btn').disabled=true;
      document.getElementById('alerts').innerHTML='';
    }
    function showAlert(msg,type){
      const m={'success':'alert-success','error':'alert-error','warn':'alert-warn'};
      document.getElementById('alerts').innerHTML=`<div class="alert ${m[type]}">${msg}</div>`;
    }
  </script>
</body>
</html>
