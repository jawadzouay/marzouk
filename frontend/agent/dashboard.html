<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>لوحة التحكم — مرزوق أكاديمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Cairo', sans-serif; background: #f0f2f5; min-height: 100vh; }

    /* ===== Header ===== */
    header {
      background: #1a1a1a; color: white;
      padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top));
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-greeting { font-size: 15px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: #e63329; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: white; cursor: pointer;
    }
    .logout-btn {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 6px 12px; border-radius: 8px;
      font-family: 'Cairo', sans-serif; cursor: pointer; font-size: 12px; font-weight: 600;
    }

    .container {
      padding: 14px;
      padding-bottom: max(100px, calc(20px + env(safe-area-inset-bottom)));
      max-width: 500px; margin: 0 auto;
    }

    /* ===== CTA Button ===== */
    .cta-btn {
      display: block; width: 100%;
      background: linear-gradient(135deg, #e63329, #c62828);
      color: white; text-align: center; text-decoration: none;
      padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 700;
      font-family: 'Cairo', sans-serif; margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(230,51,41,0.3);
      transition: transform 0.15s;
    }
    .cta-btn:active { transform: scale(0.97); }

    /* ===== Stats Grid ===== */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 14px;
    }
    .stat-card {
      background: white; border-radius: 14px; padding: 14px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-value { font-size: 28px; font-weight: 900; line-height: 1.1; }
    .stat-label { font-size: 12px; font-weight: 600; color: #6b7280; margin-top: 2px; }

    .stat-card.messages .stat-value { color: #1a1a1a; }
    .stat-card.rdv .stat-value { color: #059669; }
    .stat-card.visits .stat-value { color: #2563eb; }
    .stat-card.registered .stat-value { color: #e63329; }

    /* ===== Goal Section ===== */
    .section-card {
      background: white; border-radius: 14px; padding: 16px;
      margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .section-title {
      font-size: 14px; font-weight: 700; color: #374151;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .section-title .icon { font-size: 16px; }

    /* Delta badge */
    .delta-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 14px; font-weight: 700; margin-bottom: 10px;
    }
    .delta-badge.ahead { background: #d1fae5; color: #065f46; }
    .delta-badge.behind { background: #fee2e2; color: #991b1b; }
    .delta-badge.on-track { background: #e0e7ff; color: #3730a3; }

    .goal-chart-wrap {
      position: relative; width: 100%; height: 220px;
    }

    .goal-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: #9ca3af; margin-top: 6px;
    }

    /* Goal setup form */
    .goal-form { display: flex; flex-direction: column; gap: 10px; }
    .goal-form label { font-size: 13px; font-weight: 600; color: #374151; }
    .goal-form input {
      width: 100%; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 10px;
      font-family: 'Cairo', sans-serif; font-size: 14px;
    }
    .goal-form input:focus { outline: none; border-color: #e63329; }
    .goal-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .goal-submit-btn {
      background: #e63329; color: white; border: none; padding: 12px;
      border-radius: 10px; font-size: 14px; font-weight: 700;
      font-family: 'Cairo', sans-serif; cursor: pointer;
    }
    .goal-delete-btn {
      background: none; border: 1px solid #ef4444; color: #ef4444;
      padding: 6px 14px; border-radius: 8px; font-size: 12px;
      font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 600;
    }
    .goal-edit-btn {
      background: none; border: 1px solid #2563eb; color: #2563eb;
      padding: 6px 14px; border-radius: 8px; font-size: 12px;
      font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 600;
      margin-left: 6px;
    }

    /* ===== Reports Table ===== */
    .reports-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .reports-table th {
      background: #f9fafb; padding: 8px 6px; text-align: center;
      font-weight: 700; color: #6b7280; border-bottom: 2px solid #e5e7eb;
    }
    .reports-table td {
      padding: 8px 6px; text-align: center; border-bottom: 1px solid #f3f4f6;
    }
    .reports-table tr:last-child td { border-bottom: none; }
    .table-scroll { overflow-x: auto; margin: 0 -4px; padding: 0 4px; }

    /* ===== Empty state ===== */
    .empty-state {
      text-align: center; padding: 24px 16px; color: #9ca3af;
      font-size: 13px; font-weight: 600;
    }

    /* ===== Credentials Modal ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: white; border-radius: 16px; padding: 20px; width: 100%;
      max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; text-align: center; }
    .modal-field { margin-bottom: 10px; }
    .modal-field label { font-size: 12px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
    .modal-field input {
      width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 10px;
      font-family: 'Cairo', sans-serif; font-size: 14px;
    }
    .modal-field input:focus { outline: none; border-color: #e63329; }
    .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
    .modal-btns button {
      flex: 1; padding: 10px; border-radius: 10px; font-family: 'Cairo', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .modal-save { background: #e63329; color: white; border: none; }
    .modal-cancel { background: #f3f4f6; color: #374151; border: none; }
    .modal-msg { font-size: 12px; text-align: center; margin-top: 8px; font-weight: 600; }
    .modal-msg.ok { color: #059669; }
    .modal-msg.err { color: #ef4444; }

    /* Loading spinner */
    .loading { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-greeting" id="greeting">مرحباً</span>
  </div>
  <div class="header-right">
    <div class="avatar" id="avatarBtn" title="الإعدادات"></div>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </div>
</header>

<div class="container">

  <!-- CTA -->
  <a href="submit.html" class="cta-btn">إرسال التقرير اليومي</a>

  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card messages">
      <div class="stat-value" id="statMessages">-</div>
      <div class="stat-label">الرسائل</div>
    </div>
    <div class="stat-card rdv">
      <div class="stat-value" id="statRdv">-</div>
      <div class="stat-label">المواعيد</div>
    </div>
    <div class="stat-card visits">
      <div class="stat-value" id="statVisits">-</div>
      <div class="stat-label">الزيارات</div>
    </div>
    <div class="stat-card registered">
      <div class="stat-value" id="statRegistered">-</div>
      <div class="stat-label">المسجلين</div>
    </div>
  </div>

  <!-- Goal Section -->
  <div class="section-card" id="goalSection">
    <div class="section-title"><span class="icon">&#127919;</span> هدفي</div>
    <div id="goalContent">
      <div class="loading">جاري التحميل...</div>
    </div>
  </div>

  <!-- Last 7 Days -->
  <div class="section-card">
    <div class="section-title"><span class="icon">&#128197;</span> آخر 7 أيام</div>
    <div id="reportsContent">
      <div class="loading">جاري التحميل...</div>
    </div>
  </div>

</div>

<!-- Credentials Modal -->
<div class="modal-overlay" id="credModal">
  <div class="modal-box">
    <div class="modal-title">تغيير بيانات الدخول</div>
    <div class="modal-field">
      <label>كلمة المرور الحالية</label>
      <input type="password" id="credCurrentPin" placeholder="****" />
    </div>
    <div class="modal-field">
      <label>اسم جديد (اختياري)</label>
      <input type="text" id="credNewName" />
    </div>
    <div class="modal-field">
      <label>كلمة مرور جديدة (اختياري)</label>
      <input type="password" id="credNewPin" placeholder="****" />
    </div>
    <div class="modal-btns">
      <button class="modal-save" onclick="saveCredentials()">حفظ</button>
      <button class="modal-cancel" onclick="closeCredModal()">إلغاء</button>
    </div>
    <div class="modal-msg" id="credMsg"></div>
  </div>
</div>

<script>
const API = window.location.origin;
const token = localStorage.getItem('token');
const agentName = localStorage.getItem('agentName') || '';

if (!token) { location.href = '/index.html'; }

function hdr() { return { 'Authorization': 'Bearer ' + token }; }
function hdrJson() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }

// ── Header ──
document.getElementById('greeting').textContent = 'مرحباً ' + agentName;
document.getElementById('avatarBtn').textContent = agentName.charAt(0) || '?';
document.getElementById('avatarBtn').onclick = () => {
  document.getElementById('credModal').classList.add('show');
};

function logout() {
  localStorage.clear();
  location.href = '/index.html';
}

// ── Credentials Modal ──
function closeCredModal() {
  document.getElementById('credModal').classList.remove('show');
  document.getElementById('credMsg').textContent = '';
}

async function saveCredentials() {
  const current = document.getElementById('credCurrentPin').value.trim();
  const newName = document.getElementById('credNewName').value.trim();
  const newPin = document.getElementById('credNewPin').value.trim();
  const msgEl = document.getElementById('credMsg');

  if (!current) { msgEl.className = 'modal-msg err'; msgEl.textContent = 'أدخل كلمة المرور الحالية'; return; }
  if (!newName && !newPin) { msgEl.className = 'modal-msg err'; msgEl.textContent = 'أدخل اسم أو كلمة مرور جديدة'; return; }

  try {
    const res = await fetch(API + '/agents/me/credentials', {
      method: 'PATCH', headers: hdrJson(),
      body: JSON.stringify({ current_pin: current, new_name: newName || undefined, new_pin: newPin || undefined })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'خطأ');
    msgEl.className = 'modal-msg ok';
    msgEl.textContent = data.message || 'تم التحديث';
    if (data.name_changed && newName) {
      localStorage.setItem('agentName', newName);
      document.getElementById('greeting').textContent = 'مرحباً ' + newName;
      document.getElementById('avatarBtn').textContent = newName.charAt(0);
    }
    setTimeout(closeCredModal, 1500);
  } catch (e) {
    msgEl.className = 'modal-msg err';
    msgEl.textContent = e.message;
  }
}

// ── Load Stats (last 30 days) ──
async function loadStats() {
  try {
    const today = new Date();
    const from = new Date(today);
    from.setDate(from.getDate() - 29);
    const dateFrom = from.toISOString().split('T')[0];
    const dateTo = today.toISOString().split('T')[0];

    const res = await fetch(API + `/reports/my?date_from=${dateFrom}&date_to=${dateTo}`, { headers: hdr() });
    if (!res.ok) throw new Error();
    const reports = await res.json();

    let messages = 0, rdv = 0, visits = 0, registered = 0;
    for (const r of reports) {
      messages += r.messages || 0;
      rdv += r.rdv || 0;
      visits += r.visits || 0;
      registered += r.registered || 0;
    }

    document.getElementById('statMessages').textContent = messages;
    document.getElementById('statRdv').textContent = rdv;
    document.getElementById('statVisits').textContent = visits;
    document.getElementById('statRegistered').textContent = registered;
  } catch (e) {
    console.error('Stats error:', e);
  }
}

// ── Load Goal ──
let goalChart = null;

async function loadGoal() {
  const container = document.getElementById('goalContent');
  try {
    const res = await fetch(API + '/reports/goals', { headers: hdr() });
    if (!res.ok) throw new Error();
    const goals = await res.json();

    // Find active goal (end_date >= today)
    const today = new Date().toISOString().split('T')[0];
    const active = goals.find(g => g.end_date >= today);

    if (!active) {
      container.innerHTML = renderGoalForm();
      return;
    }

    // Load progress
    const pRes = await fetch(API + `/reports/goals/${active.id}/progress`, { headers: hdr() });
    if (!pRes.ok) throw new Error();
    const progress = await pRes.json();

    container.innerHTML = renderGoalProgress(active, progress);
    renderGoalChart(active, progress);
  } catch (e) {
    console.error('Goal error:', e);
    container.innerHTML = renderGoalForm();
  }
}

function renderGoalForm() {
  const today = new Date().toISOString().split('T')[0];
  const nextMonth = new Date();
  nextMonth.setMonth(nextMonth.getMonth() + 1);
  const endDefault = nextMonth.toISOString().split('T')[0];

  return `
    <div class="empty-state" style="margin-bottom:10px">لم تحدد هدفاً بعد. حدد هدفك لتتبع تقدمك!</div>
    <div class="goal-form" id="goalForm">
      <div>
        <label>عدد المسجلين المستهدف</label>
        <input type="number" id="goalTarget" min="1" placeholder="مثال: 30" />
      </div>
      <div class="goal-form-row">
        <div>
          <label>تاريخ البداية</label>
          <input type="date" id="goalStart" value="${today}" />
        </div>
        <div>
          <label>تاريخ النهاية</label>
          <input type="date" id="goalEnd" value="${endDefault}" />
        </div>
      </div>
      <button class="goal-submit-btn" onclick="createGoal()">تحديد الهدف</button>
    </div>
  `;
}

function renderGoalProgress(goal, progress) {
  const delta = progress.delta;
  let badgeClass, badgeText;
  if (delta > 0) {
    badgeClass = 'ahead';
    badgeText = `+${delta} متقدم`;
  } else if (delta < 0) {
    badgeClass = 'behind';
    badgeText = `${delta} متأخر`;
  } else {
    badgeClass = 'on-track';
    badgeText = 'على المسار';
  }

  return `
    <div style="text-align:center; margin-bottom:8px">
      <span class="delta-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="goal-chart-wrap">
      <canvas id="goalChartCanvas"></canvas>
    </div>
    <div class="goal-meta">
      <span>الهدف: ${goal.target_registered} مسجل</span>
      <span>${goal.start_date} → ${goal.end_date}</span>
    </div>
    <div style="text-align:center; margin-top:10px">
      <button class="goal-edit-btn" onclick='startEditGoal(${JSON.stringify(goal)})'>تعديل الهدف</button>
      <button class="goal-delete-btn" onclick="deleteGoal('${goal.id}')">حذف الهدف</button>
    </div>
  `;
}

function startEditGoal(goal) {
  const container = document.getElementById('goalContent');
  container.innerHTML = `
    <div class="goal-form">
      <div>
        <label>عدد المسجلين المستهدف</label>
        <input type="number" id="editGoalTarget" min="1" value="${goal.target_registered}" />
      </div>
      <div class="goal-form-row">
        <div>
          <label>تاريخ البداية</label>
          <input type="date" id="editGoalStart" value="${goal.start_date}" />
        </div>
        <div>
          <label>تاريخ النهاية</label>
          <input type="date" id="editGoalEnd" value="${goal.end_date}" />
        </div>
      </div>
      <div style="display:flex; gap:8px">
        <button class="goal-submit-btn" style="flex:1" onclick="saveEditGoal('${goal.id}')">حفظ التعديلات</button>
        <button class="goal-delete-btn" style="flex:0 0 auto" onclick="loadGoal()">إلغاء</button>
      </div>
    </div>
  `;
}

async function saveEditGoal(id) {
  const target = document.getElementById('editGoalTarget')?.value;
  const start = document.getElementById('editGoalStart')?.value;
  const end = document.getElementById('editGoalEnd')?.value;
  if (!target || !start || !end) { alert('أكمل جميع الحقول'); return; }
  if (parseInt(target) <= 0) { alert('الهدف يجب أن يكون أكبر من صفر'); return; }
  if (end <= start) { alert('تاريخ النهاية يجب أن يكون بعد البداية'); return; }

  try {
    const res = await fetch(API + `/reports/goals/${id}`, {
      method: 'PATCH', headers: hdrJson(),
      body: JSON.stringify({ target_registered: parseInt(target), start_date: start, end_date: end })
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'خطأ'); }
    loadGoal();
  } catch (e) { alert(e.message); }
}

function renderGoalChart(goal, progress) {
  const ctx = document.getElementById('goalChartCanvas');
  if (!ctx) return;

  // Target line data: start to end
  const targetData = [
    { x: goal.start_date, y: 0 },
    { x: goal.end_date, y: goal.target_registered }
  ];

  // Actual cumulative data
  const actualData = progress.cumulative.map(p => ({ x: p.date, y: p.value }));

  // Add today if no data yet
  if (actualData.length === 0) {
    actualData.push({ x: new Date().toISOString().split('T')[0], y: 0 });
  }

  // Determine line color based on delta
  const lineColor = progress.delta >= 0 ? '#059669' : '#ef4444';

  if (goalChart) goalChart.destroy();

  goalChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'الهدف',
          data: targetData,
          borderColor: '#9ca3af',
          borderDash: [8, 4],
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          tension: 0
        },
        {
          label: 'الفعلي',
          data: actualData,
          borderColor: lineColor,
          backgroundColor: lineColor + '20',
          borderWidth: 3,
          pointRadius: 3,
          pointBackgroundColor: lineColor,
          fill: true,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: {
          display: true, position: 'top',
          labels: { font: { family: 'Cairo', size: 11 }, usePointStyle: true, padding: 12 }
        },
        tooltip: {
          titleFont: { family: 'Cairo' },
          bodyFont: { family: 'Cairo' },
          rtl: true
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'day', displayFormats: { day: 'MM/dd' } },
          min: goal.start_date,
          max: goal.end_date,
          ticks: { font: { family: 'Cairo', size: 10 }, maxTicksLimit: 8 },
          grid: { display: false }
        },
        y: {
          beginAtZero: true,
          suggestedMax: goal.target_registered + 2,
          ticks: { font: { family: 'Cairo', size: 11 }, stepSize: Math.ceil(goal.target_registered / 5) || 1 },
          grid: { color: '#f3f4f6' }
        }
      }
    }
  });
}

async function createGoal() {
  const target = document.getElementById('goalTarget')?.value;
  const start = document.getElementById('goalStart')?.value;
  const end = document.getElementById('goalEnd')?.value;

  if (!target || !start || !end) { alert('أكمل جميع الحقول'); return; }
  if (parseInt(target) <= 0) { alert('الهدف يجب أن يكون أكبر من صفر'); return; }
  if (end <= start) { alert('تاريخ النهاية يجب أن يكون بعد البداية'); return; }

  try {
    const res = await fetch(API + '/reports/goals', {
      method: 'POST', headers: hdrJson(),
      body: JSON.stringify({ target_registered: parseInt(target), start_date: start, end_date: end })
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'خطأ'); }
    loadGoal();
  } catch (e) { alert(e.message); }
}

async function deleteGoal(id) {
  if (!confirm('هل تريد حذف هذا الهدف؟')) return;
  try {
    await fetch(API + `/reports/goals/${id}`, { method: 'DELETE', headers: hdr() });
    loadGoal();
  } catch (e) { alert('خطأ في الحذف'); }
}

// ── Load Last 7 Days Reports ──
async function loadRecentReports() {
  const container = document.getElementById('reportsContent');
  try {
    const today = new Date();
    const from = new Date(today);
    from.setDate(from.getDate() - 6);
    const dateFrom = from.toISOString().split('T')[0];
    const dateTo = today.toISOString().split('T')[0];

    const res = await fetch(API + `/reports/my?date_from=${dateFrom}&date_to=${dateTo}`, { headers: hdr() });
    if (!res.ok) throw new Error();
    const reports = await res.json();

    if (!reports.length) {
      container.innerHTML = '<div class="empty-state">لا توجد تقارير بعد</div>';
      return;
    }

    // Sort by date descending
    reports.sort((a, b) => b.report_date.localeCompare(a.report_date));

    let html = `<div class="table-scroll"><table class="reports-table">
      <thead><tr>
        <th>التاريخ</th>
        <th>رسائل</th>
        <th>مواعيد</th>
        <th>زيارات</th>
        <th>مسجلين</th>
      </tr></thead><tbody>`;

    for (const r of reports) {
      const d = r.report_date.slice(5); // MM-DD
      html += `<tr>
        <td style="font-weight:600">${d}</td>
        <td>${r.messages || 0}</td>
        <td>${r.rdv || 0}</td>
        <td>${r.visits || 0}</td>
        <td style="font-weight:700; color:#e63329">${r.registered || 0}</td>
      </tr>`;
    }

    html += '</tbody></table></div>';
    container.innerHTML = html;
  } catch (e) {
    console.error('Reports error:', e);
    container.innerHTML = '<div class="empty-state">خطأ في تحميل التقارير</div>';
  }
}

// ── Init ──
loadStats();
loadGoal();
loadRecentReports();
</script>
</body>
</html>
