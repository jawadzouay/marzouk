<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قائمة التبادل — مرزوق أكاديمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f0f4f8; min-height: 100vh; }
    header { background: #1e3a8a; color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 8px; font-family: 'Cairo', sans-serif; cursor: pointer; }
    .container { padding: 20px; max-width: 900px; margin: 0 auto; }
    .run-btn { width: 100%; padding: 16px; background: #1e3a8a; color: white; border: none; border-radius: 12px; font-size: 18px; font-family: 'Cairo', sans-serif; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
    .lead-row { background: white; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .lead-phone { font-weight: 700; direction: ltr; display: inline-block; }
    .lead-meta { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .s-bv { background: #FFF2CC; color: #7d6608; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .s-nr { background: #FCE4D6; color: #9c2a10; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .eligible-badge { background: #dcfce7; color: #166534; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .waiting-badge { background: #fef3c7; color: #92400e; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .swap-count { font-size: 12px; color: #6b7280; }
    .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; }
    .alert-success { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <header>
    <h1>🔄 قائمة التبادل</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">← رجوع</button>
  </header>

  <div class="container">
    <div id="alert"></div>
    <button class="run-btn" onclick="runSwap()">▶️ تشغيل التبادل الآن</button>
    <div id="pool-list"></div>
  </div>

  <script>
    const API = window.location.origin;
    const token = localStorage.getItem('token');
    if (!token || localStorage.getItem('role') !== 'admin') window.location.href = '/index.html';

    async function loadPool() {
      const res = await fetch(`${API}/swap/pool`, { headers: { Authorization: `Bearer ${token}` } });
      const leads = await res.json();
      const list = document.getElementById('pool-list');
      list.innerHTML = '';
      const now = new Date();

      leads.forEach(lead => {
        const eligible = lead.swap_eligible_at && new Date(lead.swap_eligible_at) <= now;
        const sc = lead.status === 'B.V' ? 's-bv' : 's-nr';
        const div = document.createElement('div');
        div.className = 'lead-row';
        div.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span class="lead-phone">${lead.phone}</span>
              <span style="margin-right:8px" class="${sc}">${lead.status}</span>
              ${eligible ? '<span class="eligible-badge">مؤهل للتبادل</span>' : '<span class="waiting-badge">قيد الانتظار</span>'}
            </div>
            <span class="swap-count">تبادل ${lead.swap_count}/3</span>
          </div>
          <div class="lead-meta">
            ${lead.name || '—'} | ${lead.city || '—'}
            ${lead.swap_eligible_at ? `| متاح: ${new Date(lead.swap_eligible_at).toLocaleDateString('ar-MA')}` : ''}
          </div>
        `;
        list.appendChild(div);
      });

      if (!leads.length) {
        list.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:30px">لا توجد عملاء في قائمة التبادل</p>';
      }
    }

    async function runSwap() {
      const res = await fetch(`${API}/swap/run`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      const alertEl = document.getElementById('alert');
      alertEl.className = 'alert alert-success';
      alertEl.textContent = `تم تبادل ${data.swapped} عميل بنجاح`;
      loadPool();
    }

    loadPool();
  </script>
</body>
</html>
