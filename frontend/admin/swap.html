<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قائمة التبادل — مرزوق أكاديمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f0f4f8; min-height: 100vh; }
    header { background: #1a1a1a; color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 8px; font-family: 'Cairo', sans-serif; cursor: pointer; }
    .container { padding: 20px; max-width: 900px; margin: 0 auto; }

    /* Level selector */
    .level-card { background: white; border-radius: 14px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .level-card h2 { font-size: 15px; color: #374151; margin-bottom: 14px; }
    .level-btns { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
    .level-btn { padding: 12px 10px; border: 2px solid #e5e7eb; border-radius: 10px; background: white; font-family: 'Cairo', sans-serif; font-size: 13px; cursor: pointer; text-align: center; transition: all .2s; }
    .level-btn.active { border-color: #e63329; background: #fef2f2; color: #e63329; font-weight: 700; }
    .level-btn .level-num { font-size: 22px; font-weight: 900; display: block; }
    .level-btn .level-desc { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .level-btn.active .level-desc { color: #e63329; }

    /* Run button */
    .run-btn { width: 100%; padding: 14px; background: #1a1a1a; color: white; border: none; border-radius: 12px; font-size: 16px; font-family: 'Cairo', sans-serif; font-weight: 700; cursor: pointer; margin-bottom: 16px; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .run-btn.manual-mode { background: #7c3aed; }

    /* Pool */
    .lead-card { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .lead-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .lead-phone { font-weight: 700; direction: ltr; font-size: 15px; }
    .badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .s-bv { background: #FFF2CC; color: #7d6608; }
    .s-nr { background: #FCE4D6; color: #9c2a10; }
    .eligible-badge { background: #dcfce7; color: #166534; }
    .waiting-badge { background: #fef3c7; color: #92400e; }
    .lead-meta { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
    .swap-count { font-size: 12px; color: #9ca3af; }

    /* History */
    .history-toggle { background: none; border: 1px solid #e5e7eb; border-radius: 6px; padding: 4px 10px; font-family: 'Cairo', sans-serif; font-size: 11px; color: #6b7280; cursor: pointer; }
    .history-list { margin-top: 8px; border-top: 1px solid #f3f4f6; padding-top: 8px; display: none; }
    .history-item { font-size: 11px; color: #6b7280; padding: 4px 0; border-bottom: 1px solid #f9fafb; }
    .history-item:last-child { border-bottom: none; }
    .history-action { font-weight: 600; color: #374151; }

    /* Manual assignment */
    .manual-row { display: flex; gap: 8px; margin-top: 10px; }
    .manual-row select { flex: 1; padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 13px; }
    .btn-assign { background: #7c3aed; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-family: 'Cairo', sans-serif; font-weight: 700; cursor: pointer; font-size: 13px; white-space: nowrap; }

    .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 14px; font-size: 14px; }
    .alert-success { background: #dcfce7; color: #166534; }
    .alert-error   { background: #fef2f2; color: #dc2626; }
    .empty { text-align: center; color: #9ca3af; padding: 40px 20px; }
  </style>
</head>
<body>
  <header>
    <h1>🔄 قائمة التبادل</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">← رجوع</button>
  </header>

  <div class="container">
    <div id="alert"></div>

    <!-- Swap Level Selector -->
    <div class="level-card">
      <h2>⚙️ مستوى التبادل</h2>
      <div class="level-btns">
        <button class="level-btn" id="lvl-1" onclick="setLevel(1)">
          <span class="level-num">1</span>
          🌍 جميع الفروع والمدن
          <span class="level-desc">يتم التبادل بين كل الوكلاء في كل المدن</span>
        </button>
        <button class="level-btn" id="lvl-2" onclick="setLevel(2)">
          <span class="level-num">2</span>
          🏙️ نفس المدينة فقط
          <span class="level-desc">يتم التبادل بين وكلاء نفس المدينة</span>
        </button>
        <button class="level-btn" id="lvl-3" onclick="setLevel(3)">
          <span class="level-num">3</span>
          🏢 نفس الفرع فقط
          <span class="level-desc">يتم التبادل بين وكلاء نفس المركز</span>
        </button>
        <button class="level-btn" id="lvl-4" onclick="setLevel(4)">
          <span class="level-num">4</span>
          ✋ يدوي
          <span class="level-desc">أنت تختار يدوياً لمن يذهب كل عميل</span>
        </button>
      </div>
    </div>

    <button class="run-btn" id="run-btn" onclick="runSwap()">▶️ تشغيل التبادل التلقائي</button>
    <div id="pool-list"></div>
  </div>

  <script>
    const API = window.location.origin;
    const token = localStorage.getItem('token');
    if (!token || localStorage.getItem('role') !== 'admin') window.location.href = '/index.html';

    let currentLevel = 1;
    let allAgents = [];

    async function init() {
      const [settingsRes, agentsRes] = await Promise.all([
        fetch(`${API}/swap/settings`, { headers: { Authorization: `Bearer ${token}` } }),
        fetch(`${API}/swap/agents`, { headers: { Authorization: `Bearer ${token}` } })
      ]);
      if (settingsRes.ok) {
        const s = await settingsRes.json();
        currentLevel = s.swap_level;
        updateLevelUI();
      }
      if (agentsRes.ok) allAgents = await agentsRes.json();
      loadPool();
    }

    function updateLevelUI() {
      [1,2,3,4].forEach(l => {
        document.getElementById(`lvl-${l}`).classList.toggle('active', l === currentLevel);
      });
      const runBtn = document.getElementById('run-btn');
      if (currentLevel === 4) {
        runBtn.textContent = '✋ الوضع اليدوي — عيّن يدوياً من القائمة أدناه';
        runBtn.classList.add('manual-mode');
        runBtn.disabled = true;
      } else {
        runBtn.textContent = `▶️ تشغيل التبادل — المستوى ${currentLevel}`;
        runBtn.classList.remove('manual-mode');
        runBtn.disabled = false;
      }
    }

    async function setLevel(level) {
      const res = await fetch(`${API}/swap/settings`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ swap_level: level })
      });
      if (res.ok) {
        currentLevel = level;
        updateLevelUI();
        showAlert(`تم تغيير مستوى التبادل إلى المستوى ${level}`, 'success');
        loadPool();
      }
    }

    async function loadPool() {
      const res = await fetch(`${API}/swap/pool`, { headers: { Authorization: `Bearer ${token}` } });
      const leads = await res.json();
      const list = document.getElementById('pool-list');
      list.innerHTML = '';
      const now = new Date();

      if (!leads.length) {
        list.innerHTML = '<div class="empty">لا توجد عملاء في قائمة التبادل</div>';
        return;
      }

      leads.forEach(lead => {
        const eligible = lead.swap_eligible_at && new Date(lead.swap_eligible_at) <= now;
        const sc = lead.status === 'B.V' ? 's-bv' : 's-nr';

        // Build history HTML
        const historyHtml = (lead.history || []).map(h => `
          <div class="history-item">
            <span class="history-action">${actionLabel(h.action)}</span>
            ${h.status_before !== h.status_after ? ` · ${h.status_before} → ${h.status_after}` : ''}
            ${h.note ? ` · <em>${h.note}</em>` : ''}
            <span style="float:left;color:#d1d5db">${new Date(h.created_at).toLocaleDateString('ar-MA')}</span>
          </div>`).join('');

        // Build agent options for manual
        const agentOptions = allAgents
          .filter(a => a.id !== lead.original_agent && a.id !== lead.current_agent)
          .map(a => `<option value="${a.id}">${a.name} — ${a.branch_name} (${a.city})</option>`)
          .join('');

        const div = document.createElement('div');
        div.className = 'lead-card';
        div.innerHTML = `
          <div class="lead-top">
            <div>
              <span class="lead-phone">${lead.phone}</span>
              <span class="badge ${sc}" style="margin-right:6px">${lead.status}</span>
              ${eligible ? '<span class="badge eligible-badge">مؤهل للتبادل</span>' : '<span class="badge waiting-badge">قيد الانتظار</span>'}
            </div>
            <span class="swap-count">تبادل ${lead.swap_count}/3</span>
          </div>
          <div class="lead-meta">
            ${lead.name || '—'} | ${lead.city || '—'}
            ${lead.swap_eligible_at ? `| متاح: ${new Date(lead.swap_eligible_at).toLocaleDateString('ar-MA')}` : ''}
          </div>
          ${lead.history?.length ? `
            <button class="history-toggle" onclick="toggleHistory(this)">📋 السجل (${lead.history.length})</button>
            <div class="history-list">${historyHtml}</div>` : ''}
          ${currentLevel === 4 && eligible ? `
            <div class="manual-row">
              <select id="agent-sel-${lead.id}">
                <option value="">— اختر الوكيل —</option>
                ${agentOptions}
              </select>
              <button class="btn-assign" onclick="manualAssign('${lead.id}')">تعيين</button>
            </div>` : ''}
        `;
        list.appendChild(div);
      });
    }

    function actionLabel(action) {
      const map = { swapped: 'تبادل', status_updated: 'تحديث الحالة', submitted: 'إضافة', rdv_booked: 'حجز موعد', registered: 'تسجيل', visited_center: 'زيارة المركز' };
      return map[action] || action;
    }

    function toggleHistory(btn) {
      const list = btn.nextElementSibling;
      const open = list.style.display === 'block';
      list.style.display = open ? 'none' : 'block';
      btn.textContent = open ? btn.textContent.replace('▲','📋') : btn.textContent.replace('📋','▲');
    }

    async function runSwap() {
      const res = await fetch(`${API}/swap/run`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (res.ok) {
        showAlert(`تم تبادل ${data.swapped} عميل بنجاح`, 'success');
        loadPool();
      } else {
        showAlert(data.detail || 'خطأ', 'error');
      }
    }

    async function manualAssign(leadId) {
      const sel = document.getElementById(`agent-sel-${leadId}`);
      const agentId = sel?.value;
      if (!agentId) { showAlert('اختر وكيلاً أولاً', 'error'); return; }
      const res = await fetch(`${API}/swap/manual`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ lead_id: leadId, agent_id: agentId })
      });
      const data = await res.json();
      if (res.ok) { showAlert('تم التعيين بنجاح', 'success'); loadPool(); }
      else showAlert(data.detail || 'خطأ', 'error');
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      setTimeout(() => el.textContent = '', 4000);
    }

    init();
  </script>
</body>
</html>
