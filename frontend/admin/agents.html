<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة الوكلاء — مرزوق أكاديمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f0f4f8; min-height: 100vh; }
    header { background: #1a1a1a; color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 8px; font-family: 'Cairo', sans-serif; cursor: pointer; }
    .container { padding: 20px; max-width: 800px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .card h2 { margin-bottom: 16px; font-size: 16px; color: #1a1a1a; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    input, select { flex: 1; min-width: 120px; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 15px; font-family: 'Cairo', sans-serif; }
    input:focus, select:focus { outline: none; border-color: #1a1a1a; }
    .btn-add  { background: #1a1a1a; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-family: 'Cairo', sans-serif; font-size: 15px; cursor: pointer; font-weight: 700; white-space: nowrap; }
    .btn-red  { background: #e63329; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-family: 'Cairo', sans-serif; font-size: 15px; cursor: pointer; font-weight: 700; white-space: nowrap; }
    .btn-sm   { border: none; border-radius: 6px; padding: 5px 12px; font-family: 'Cairo', sans-serif; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-edit   { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .btn-save   { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .btn-cancel { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .btn-delete { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .btn-fire   { background: #fef2f2; color: #dc2626; border: 2px solid #fecaca; border-radius: 8px; padding: 8px 14px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 600; }
    .btn-wipe   { background: #1a1a1a; color: white; border: 2px solid #1a1a1a; border-radius: 8px; padding: 8px 14px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 600; }
    .btn-transfer { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; border-radius: 8px; padding: 8px 14px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 600; font-size: 13px; }
    .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 14px; font-size: 14px; }
    .alert-success { background: #dcfce7; color: #166534; }
    .alert-error   { background: #fef2f2; color: #dc2626; }
    .empty-state { text-align: center; color: #9ca3af; padding: 20px; font-size: 14px; }
    .section-title { font-size: 16px; font-weight: 700; color: #374151; margin: 0 0 12px; }

    /* Cities list */
    .city-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #f9fafb; border-radius: 8px; margin-bottom: 8px; border: 1px solid #e5e7eb; }
    .city-item-name { font-weight: 700; font-size: 14px; color: #1a1a1a; }
    .city-item-actions { display: flex; gap: 6px; }
    .city-item-edit { display: flex; gap: 6px; align-items: center; width: 100%; }
    .city-item-edit input { padding: 6px 10px; font-size: 14px; }

    /* Branches grouped */
    .city-group { margin-bottom: 14px; }
    .city-group-header { background: #1a1a1a; color: white; border-radius: 10px 10px 0 0; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
    .city-group-header span { font-weight: 700; font-size: 14px; }
    .city-group-body { border: 2px solid #1a1a1a; border-top: none; border-radius: 0 0 10px 10px; padding: 8px; background: #f9fafb; }
    .branch-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: white; border-radius: 8px; margin-bottom: 6px; border: 1px solid #e5e7eb; }
    .branch-item:last-child { margin-bottom: 0; }
    .branch-item-name { font-weight: 600; font-size: 14px; }
    .branch-item-edit { display: flex; gap: 6px; align-items: center; width: 100%; }
    .branch-item-edit input { padding: 6px 10px; font-size: 14px; }

    /* Agents */
    .agent-row { background: white; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .agent-main { display: flex; justify-content: space-between; align-items: flex-start; }
    .agent-info .agent-name { font-weight: 700; }
    .agent-info .agent-meta { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .branch-tag { display: inline-block; background: #e0f2fe; color: #0369a1; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 600; margin-top: 4px; }
    .agent-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .transfer-panel { margin-top: 10px; padding: 10px 12px; background: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .transfer-panel select { flex: 1; min-width: 160px; padding: 7px 10px; font-size: 13px; }
    .transfer-panel .btn-sm { padding: 7px 14px; }
    .rename-panel { margin-top: 10px; padding: 10px 12px; background: #eff6ff; border-radius: 8px; border: 1px solid #bfdbfe; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .rename-panel input { flex: 1; min-width: 160px; padding: 7px 10px; font-size: 13px; border: 2px solid #bfdbfe; border-radius: 8px; font-family: 'Cairo', sans-serif; }
    .btn-rename { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; border-radius: 8px; padding: 8px 14px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 600; font-size: 13px; }
    .dayoff-tag { display: inline-block; background: #fef9c3; color: #854d0e; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 600; margin-top: 4px; }
    .btn-dayoff { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 14px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 600; font-size: 13px; }
    .dayoff-panel { margin-top: 10px; padding: 10px 12px; background: #fefce8; border-radius: 8px; border: 1px solid #fde68a; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .dayoff-panel select { flex: 1; min-width: 160px; padding: 7px 10px; font-size: 13px; border: 2px solid #fde68a; border-radius: 8px; font-family: 'Cairo', sans-serif; }

    /* Requests */
    .request-row { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .request-row .req-name { font-weight: 700; font-size: 15px; }
    .request-row .req-pass { font-size: 13px; color: #6b7280; margin-top: 3px; direction: ltr; text-align: right; }
    .request-row .req-pass span { background: #f3f4f6; padding: 2px 8px; border-radius: 4px; font-family: monospace; color: #374151; }
    .request-row .req-date { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .req-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .req-edit-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .req-edit-row input, .req-edit-row select { flex: 1; min-width: 120px; padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 13px; font-family: 'Cairo', sans-serif; }
    .btn-approve { background: #10b981; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 700; font-size: 13px; }
    .btn-reject  { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; border-radius: 8px; padding: 8px 16px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: 600; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1>إدارة الوكلاء</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">← رجوع</button>
  </header>

  <div class="container">

    <!-- ① Cities -->
    <div class="card">
      <h2>📍 إدارة المدن</h2>
      <div id="city-alert"></div>
      <div class="form-row" style="margin-bottom:16px">
        <input type="text" id="new-city-name" placeholder="اسم المدينة (مثال: طنجة)" />
        <button class="btn-add" onclick="addCity()">+ إضافة مدينة</button>
      </div>
      <div id="cities-list"><div class="empty-state">لا يوجد مدن بعد</div></div>
    </div>

    <!-- ② Branches -->
    <div class="card">
      <h2>🏢 إدارة الفروع</h2>
      <div id="branch-alert"></div>
      <div class="form-row" style="margin-bottom:16px">
        <input type="text" id="new-branch-name" placeholder="اسم الفرع (مثال: النجمة)" />
        <select id="new-branch-city">
          <option value="">— اختر المدينة —</option>
        </select>
        <button class="btn-red" onclick="addBranch()">+ إضافة فرع</button>
      </div>
      <div id="branches-list"><div class="empty-state">لا يوجد فروع بعد</div></div>
    </div>

    <!-- ③ Registration Requests -->
    <div class="card" id="requests-card" style="border: 2px solid #fbbf24;">
      <h2>🔔 طلبات إنشاء الحساب <span id="requests-badge" style="background:#e63329;color:white;border-radius:20px;padding:2px 10px;font-size:13px;margin-right:8px">0</span></h2>
      <div id="requests-list"><div class="empty-state">لا يوجد طلبات معلقة</div></div>
    </div>

    <!-- ④ Add Agent -->
    <div class="card">
      <h2>إضافة وكيل جديد</h2>
      <div id="alert"></div>
      <div class="form-row">
        <input type="text" id="new-name" placeholder="اسم الوكيل" />
        <input type="text" id="new-pin" placeholder="كلمة المرور / PIN" maxlength="20" />
        <select id="new-branch">
          <option value="">— الفرع (اختياري) —</option>
        </select>
        <button class="btn-add" onclick="addAgent()">إضافة</button>
      </div>
    </div>

    <!-- ⑤ Agents List -->
    <div class="section-title">الوكلاء النشطون</div>
    <div id="agents-list"></div>
  </div>

  <script>
    const API = window.location.origin;
    const token = localStorage.getItem('token');
    if (!token || localStorage.getItem('role') !== 'admin') window.location.href = '/index.html';

    let allCities   = [];
    let allBranches = [];
    let branchMap   = {};

    // Central fetch helper — never throws, always returns {ok, data}
    async function callAPI(url, opts = {}) {
      try {
        const res = await fetch(url, {
          ...opts,
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
            ...(opts.headers || {})
          }
        });
        let data = {};
        try { data = await res.json(); } catch(e) {}
        return { ok: res.ok, data, status: res.status };
      } catch (e) {
        return { ok: false, data: { detail: 'تعذر الاتصال بالخادم — تأكد من تشغيل الخادم' }, status: 0 };
      }
    }

    // ─── CITIES ────────────────────────────────────────────
    async function loadCities() {
      const { ok, data } = await callAPI(`${API}/cities/`);
      if (!ok) return;
      allCities = data;

      const list = document.getElementById('cities-list');
      if (!allCities.length) {
        list.innerHTML = '<div class="empty-state">لا يوجد مدن بعد — أضف مدينة أولاً</div>';
      } else {
        list.innerHTML = allCities.map(c => renderCityRow(c)).join('');
      }

      // Refresh city dropdown in branch form
      const sel = document.getElementById('new-branch-city');
      sel.innerHTML = '<option value="">— اختر المدينة —</option>' +
        allCities.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    }

    function renderCityRow(c) {
      return `<div class="city-item" id="city-item-${c.id}">
        <span class="city-item-name">📍 ${c.name}</span>
        <div class="city-item-actions">
          <button class="btn-sm btn-edit" onclick="startEditCity('${c.id}','${escQ(c.name)}')">✏️ تعديل</button>
          <button class="btn-sm btn-delete" onclick="deleteCity('${c.id}','${escQ(c.name)}')">حذف</button>
        </div>
      </div>`;
    }

    function startEditCity(id, name) {
      document.getElementById(`city-item-${id}`).outerHTML = `
        <div class="city-item" id="city-item-${id}">
          <div class="city-item-edit">
            <input type="text" id="city-edit-${id}" value="${name}" style="flex:1" />
            <button class="btn-sm btn-save"   onclick="saveEditCity('${id}')">✅ حفظ</button>
            <button class="btn-sm btn-cancel" onclick="loadCities()">إلغاء</button>
          </div>
        </div>`;
      document.getElementById(`city-edit-${id}`).focus();
    }

    async function saveEditCity(id) {
      const name = document.getElementById(`city-edit-${id}`).value.trim();
      if (!name) return;
      const { ok, data } = await callAPI(`${API}/cities/${id}`, { method: 'PUT', body: JSON.stringify({ name }) });
      if (ok) { loadCities(); loadBranches(); }
      else showAlert('city-alert', data.detail || 'خطأ', false);
    }

    async function addCity() {
      const name = document.getElementById('new-city-name').value.trim();
      if (!name) return showAlert('city-alert', 'يرجى إدخال اسم المدينة', false);
      const { ok, data } = await callAPI(`${API}/cities/`, { method: 'POST', body: JSON.stringify({ name }) });
      if (ok) {
        document.getElementById('new-city-name').value = '';
        showAlert('city-alert', `تم إضافة مدينة "${name}"`, true);
        loadCities();
      } else {
        showAlert('city-alert', data.detail || 'خطأ', false);
      }
    }

    async function deleteCity(id, name) {
      if (!confirm(`هل أنت متأكد من حذف مدينة "${name}"؟`)) return;
      const { ok, data } = await callAPI(`${API}/cities/${id}`, { method: 'DELETE' });
      if (ok) loadCities();
      else showAlert('city-alert', data.detail || 'خطأ', false);
    }

    // ─── BRANCHES ──────────────────────────────────────────
    async function loadBranches() {
      const { ok, data } = await callAPI(`${API}/branches/`);
      if (!ok) return;
      allBranches = data;
      branchMap = {};
      allBranches.forEach(b => { branchMap[b.id] = b; });

      const list = document.getElementById('branches-list');
      if (!allBranches.length) {
        list.innerHTML = '<div class="empty-state">لا يوجد فروع بعد</div>';
      } else {
        // Group by city
        const groups = {};
        allBranches.forEach(b => {
          const city = b.city || '— بدون مدينة —';
          if (!groups[city]) groups[city] = [];
          groups[city].push(b);
        });
        list.innerHTML = Object.entries(groups).map(([city, branches]) => `
          <div class="city-group">
            <div class="city-group-header">
              <span>📍 ${city}</span>
              <span style="font-size:12px;opacity:0.7">${branches.length} فرع</span>
            </div>
            <div class="city-group-body">
              ${branches.map(b => renderBranchRow(b)).join('')}
            </div>
          </div>`).join('');
      }

      // Update branch dropdown in add-agent form
      const sel = document.getElementById('new-branch');
      sel.innerHTML = '<option value="">— الفرع (اختياري) —</option>' +
        allBranches.map(b => `<option value="${b.id}">${b.city ? b.city + ' — ' : ''}${b.name}</option>`).join('');
    }

    function renderBranchRow(b) {
      return `<div class="branch-item" id="branch-item-${b.id}">
        <span class="branch-item-name">🏢 ${b.name}</span>
        <div style="display:flex;gap:6px">
          <button class="btn-sm btn-edit" onclick="startEditBranch('${b.id}','${escQ(b.name)}')">✏️ تعديل</button>
          <button class="btn-sm btn-delete" onclick="deleteBranch('${b.id}','${escQ(b.name)}')">حذف</button>
        </div>
      </div>`;
    }

    function startEditBranch(id, name) {
      document.getElementById(`branch-item-${id}`).outerHTML = `
        <div class="branch-item" id="branch-item-${id}">
          <div class="branch-item-edit">
            <input type="text" id="branch-edit-${id}" value="${name}" style="flex:1" />
            <button class="btn-sm btn-save"   onclick="saveEditBranch('${id}')">✅ حفظ</button>
            <button class="btn-sm btn-cancel" onclick="loadBranches()">إلغاء</button>
          </div>
        </div>`;
      document.getElementById(`branch-edit-${id}`).focus();
    }

    async function saveEditBranch(id) {
      const name = document.getElementById(`branch-edit-${id}`).value.trim();
      if (!name) return;
      const { ok, data } = await callAPI(`${API}/branches/${id}`, { method: 'PUT', body: JSON.stringify({ name }) });
      if (ok) { loadBranches(); loadAgents(); }
      else showAlert('branch-alert', data.detail || 'خطأ', false);
    }

    async function addBranch() {
      const name = document.getElementById('new-branch-name').value.trim();
      const city = document.getElementById('new-branch-city').value;
      if (!name) return showAlert('branch-alert', 'يرجى إدخال اسم الفرع', false);
      if (!city) return showAlert('branch-alert', 'يرجى اختيار المدينة أولاً', false);
      const { ok, data } = await callAPI(`${API}/branches/`, { method: 'POST', body: JSON.stringify({ name, city }) });
      if (ok) {
        document.getElementById('new-branch-name').value = '';
        document.getElementById('new-branch-city').value = '';
        showAlert('branch-alert', `تم إضافة فرع "${name}"`, true);
        loadBranches();
      } else {
        showAlert('branch-alert', data.detail || 'خطأ', false);
      }
    }

    async function deleteBranch(id, name) {
      if (!confirm(`هل أنت متأكد من حذف فرع "${name}"؟`)) return;
      const { ok, data } = await callAPI(`${API}/branches/${id}`, { method: 'DELETE' });
      if (ok) { loadBranches(); loadAgents(); }
      else showAlert('branch-alert', data.detail || 'خطأ', false);
    }

    // ─── AGENTS ────────────────────────────────────────────
    async function loadAgents() {
      const { ok, data: agents } = await callAPI(`${API}/agents/`);
      if (!ok) return;
      const list = document.getElementById('agents-list');
      const active = agents.filter(a => a.is_active);
      if (!active.length) {
        list.innerHTML = '<div class="empty-state">لا يوجد وكلاء نشطون</div>';
        return;
      }
      list.innerHTML = active.map(a => {
        const branch = a.branch_id ? branchMap[a.branch_id] : null;
        const branchLabel = branch
          ? `<span class="branch-tag">🏢 ${branch.city ? branch.city + ' — ' : ''}${branch.name}</span>`
          : '';
        const DAY_NAMES = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
        const dayOffLabel = (a.day_off != null)
          ? `<span class="dayoff-tag">🏖️ إجازة: ${DAY_NAMES[a.day_off]}</span>`
          : '';
        const driveLink = a.drive_folder_id
          ? `<a href="https://drive.google.com/drive/folders/${a.drive_folder_id}" target="_blank" style="display:inline-block;background:#e8f5e9;color:#2e7d32;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;margin-top:4px;text-decoration:none">📁 Drive</a>`
          : '';
        return `<div class="agent-row" id="agent-row-${a.id}">
          <div class="agent-main">
            <div class="agent-info">
              <div class="agent-name">${a.name}</div>
              <div class="agent-meta">تاريخ الإضافة: ${new Date(a.created_at).toLocaleDateString('ar-MA')}</div>
              ${branchLabel}
              ${dayOffLabel}
              ${driveLink}
            </div>
            <div class="agent-actions">
              <button class="btn-dayoff" onclick="toggleDayOff('${a.id}',${a.day_off ?? 'null'})">🏖️ يوم إجازة</button>
              <button class="btn-rename" onclick="toggleRename('${a.id}','${escQ(a.name)}')">✏️ تعديل الاسم</button>
              <button class="btn-transfer" onclick="toggleTransfer('${a.id}')">📦 نقل الفرع</button>
              <button class="btn-fire" onclick="fireAgent('${a.id}','${escQ(a.name)}')">🔴 إيقاف</button>
              <button class="btn-wipe" onclick="fireAndWipe('${a.id}','${escQ(a.name)}')">🗑️ إيقاف ومسح</button>
            </div>
          </div>
          <div class="dayoff-panel" id="dayoff-${a.id}" style="display:none">
            <span style="font-size:13px;font-weight:600;color:#854d0e">🏖️ يوم الإجازة الأسبوعية:</span>
            <select id="dayoff-sel-${a.id}">
              <option value="">— بدون إجازة ثابتة —</option>
              <option value="0">الأحد</option>
              <option value="1">الاثنين</option>
              <option value="2">الثلاثاء</option>
              <option value="3">الأربعاء</option>
              <option value="4">الخميس</option>
              <option value="5">الجمعة</option>
              <option value="6">السبت</option>
            </select>
            <button class="btn-sm btn-save" onclick="confirmDayOff('${a.id}')">✅ حفظ</button>
            <button class="btn-sm btn-cancel" onclick="toggleDayOff('${a.id}')">إلغاء</button>
          </div>
          <div class="rename-panel" id="rename-${a.id}" style="display:none">
            <span style="font-size:13px;font-weight:600;color:#1d4ed8">✏️ الاسم الجديد:</span>
            <input type="text" id="rename-inp-${a.id}" placeholder="اكتب الاسم الجديد..." />
            <button class="btn-sm btn-save" onclick="confirmRename('${a.id}')">✅ حفظ</button>
            <button class="btn-sm btn-cancel" onclick="toggleRename('${a.id}')">إلغاء</button>
          </div>
          <div class="transfer-panel" id="transfer-${a.id}" style="display:none">
            <span style="font-size:13px;font-weight:600">نقل إلى فرع:</span>
            <select id="transfer-sel-${a.id}">
              <option value="">— بدون فرع —</option>
              ${allBranches.map(b => `<option value="${b.id}" ${b.id === a.branch_id ? 'selected' : ''}>${b.city ? b.city + ' — ' : ''}${b.name}</option>`).join('')}
            </select>
            <button class="btn-sm btn-save" onclick="confirmTransfer('${a.id}')">✅ تأكيد</button>
            <button class="btn-sm btn-cancel" onclick="toggleTransfer('${a.id}')">إلغاء</button>
          </div>
        </div>`;
      }).join('');
    }

    function toggleDayOff(agentId, currentDayOff) {
      const panel = document.getElementById(`dayoff-${agentId}`);
      const isHidden = panel.style.display === 'none';
      panel.style.display = isHidden ? 'flex' : 'none';
      if (isHidden) {
        const sel = document.getElementById(`dayoff-sel-${agentId}`);
        sel.value = (currentDayOff != null) ? String(currentDayOff) : '';
      }
    }

    async function confirmDayOff(agentId) {
      const val = document.getElementById(`dayoff-sel-${agentId}`).value;
      const day_off = val === '' ? null : parseInt(val);
      const { ok, data } = await callAPI(`${API}/agents/${agentId}/day-off`, {
        method: 'PATCH', body: JSON.stringify({ day_off })
      });
      if (ok) {
        const DAY_NAMES = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
        const msg = day_off != null ? `تم تعيين إجازة ${DAY_NAMES[day_off]}` : 'تم إلغاء الإجازة الثابتة';
        showAlert('alert', msg, true);
        loadAgents();
      } else {
        showAlert('alert', data.detail || 'خطأ', false);
      }
    }

    function toggleRename(agentId, currentName) {
      const panel = document.getElementById(`rename-${agentId}`);
      const isHidden = panel.style.display === 'none';
      panel.style.display = isHidden ? 'flex' : 'none';
      if (isHidden) {
        const inp = document.getElementById(`rename-inp-${agentId}`);
        inp.value = currentName || '';
        inp.focus();
        inp.select();
      }
    }

    async function confirmRename(agentId) {
      const newName = document.getElementById(`rename-inp-${agentId}`).value.trim();
      if (!newName) return;
      const { ok, data } = await callAPI(`${API}/agents/${agentId}/rename`, { method: 'PATCH', body: JSON.stringify({ name: newName }) });
      if (ok) {
        showAlert('alert', `تم تغيير الاسم إلى "${newName}"`, true);
        loadAgents();
      } else {
        showAlert('alert', data.detail || 'خطأ في التعديل', false);
      }
    }

    function toggleTransfer(agentId) {
      const panel = document.getElementById(`transfer-${agentId}`);
      panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
    }

    async function confirmTransfer(agentId) {
      const branch_id = document.getElementById(`transfer-sel-${agentId}`).value || null;
      const { ok, data } = await callAPI(`${API}/agents/${agentId}/branch`, { method: 'PATCH', body: JSON.stringify({ branch_id }) });
      if (ok) { showAlert('alert', 'تم نقل الوكيل بنجاح', true); loadAgents(); }
      else showAlert('alert', data.detail || 'خطأ في النقل', false);
    }

    async function addAgent() {
      const name = document.getElementById('new-name').value.trim();
      const pin  = document.getElementById('new-pin').value.trim();
      const branch_id = document.getElementById('new-branch').value || null;
      if (!name || !pin) return showAlert('alert', 'يرجى إدخال الاسم وكلمة المرور', false);
      const { ok, data } = await callAPI(`${API}/agents/`, { method: 'POST', body: JSON.stringify({ name, pin, branch_id }) });
      if (ok) {
        showAlert('alert', `تم إضافة الوكيل ${name}`, true);
        document.getElementById('new-name').value = '';
        document.getElementById('new-pin').value = '';
        document.getElementById('new-branch').value = '';
        loadAgents();
      } else {
        showAlert('alert', data.detail || 'خطأ', false);
      }
    }

    async function fireAgent(id, name) {
      if (!confirm(`هل أنت متأكد من إيقاف الوكيل "${name}"؟ سيتم إعادة توزيع عملائه.`)) return;
      const { ok } = await callAPI(`${API}/agents/${id}`, { method: 'DELETE' });
      if (ok) loadAgents();
    }

    async function fireAndWipe(id, name) {
      if (!confirm(`إيقاف ومسح اسم "${name}"؟ سيُحذف الاسم نهائياً.`)) return;
      const { ok } = await callAPI(`${API}/agents/${id}/wipe`, { method: 'DELETE' });
      if (ok) { showAlert('alert', `تم إيقاف ومسح "${name}"`, true); loadAgents(); }
    }

    // ─── REQUESTS ──────────────────────────────────────────
    async function loadRequests() {
      const { ok, data: requests } = await callAPI(`${API}/agents/requests`);
      if (!ok) return;
      const badge = document.getElementById('requests-badge');
      badge.textContent = requests.length;
      badge.style.display = requests.length ? 'inline' : 'none';

      const list = document.getElementById('requests-list');
      if (!requests.length) {
        list.innerHTML = '<div class="empty-state">لا يوجد طلبات معلقة ✅</div>';
        return;
      }
      list.innerHTML = requests.map(r => {
        const reqCity   = r.requested_city || '';
        const reqBranch = r.requested_branch_id || '';
        const requestedLine = (reqCity || r.requested_branch_name)
          ? `<div class="req-pass" style="color:#0369a1">📍 المدينة المطلوبة: <span>${reqCity || '—'}</span> · الفرع: <span>${r.requested_branch_name || '—'}</span></div>`
          : '';
        return `
        <div class="request-row" id="req-${r.id}">
          <div class="req-name">👤 ${r.requested_name}</div>
          <div class="req-pass">كلمة المرور: <span>${r.password_plain}</span></div>
          ${requestedLine}
          <div class="req-date">📅 ${new Date(r.created_at).toLocaleString('ar-MA')}</div>
          <div class="req-edit-row">
            <input type="text" id="fname-${r.id}" value="${r.requested_name}" placeholder="الاسم النهائي" />
            <select id="fbranch-${r.id}">
              <option value="">— بدون فرع —</option>
              ${allBranches.map(b => `<option value="${b.id}" ${b.id === reqBranch ? 'selected' : ''}>${b.city ? b.city + ' — ' : ''}${b.name}</option>`).join('')}
            </select>
          </div>
          <div class="req-actions">
            <button class="btn-approve" onclick="approveRequest('${r.id}')">✅ قبول</button>
            <button class="btn-reject"  onclick="rejectRequest('${r.id}','${escQ(r.requested_name)}')">❌ رفض</button>
          </div>
        </div>`;
      }).join('');
    }

    async function approveRequest(id) {
      const final_name = document.getElementById(`fname-${id}`).value.trim();
      const branch_id  = document.getElementById(`fbranch-${id}`).value || null;
      const { ok, data } = await callAPI(`${API}/agents/requests/${id}/approve`, { method: 'POST', body: JSON.stringify({ final_name, branch_id }) });
      if (ok) { showAlert('alert', data.message, true); loadRequests(); loadAgents(); }
      else showAlert('alert', data.detail || 'خطأ', false);
    }

    async function rejectRequest(id, name) {
      if (!confirm(`رفض طلب "${name}"؟`)) return;
      await callAPI(`${API}/agents/requests/${id}`, { method: 'DELETE' });
      loadRequests();
    }

    // ─── UTILS ─────────────────────────────────────────────
    function showAlert(id, msg, success) {
      const el = document.getElementById(id);
      el.className = 'alert ' + (success ? 'alert-success' : 'alert-error');
      el.textContent = msg;
      setTimeout(() => { el.className = ''; el.textContent = ''; }, 4000);
    }

    function escQ(s) { return (s || '').replace(/'/g, "\\'"); }

    // ─── INIT ──────────────────────────────────────────────
    async function init() {
      await loadCities();
      await loadBranches();
      await loadAgents();
      await loadRequests();
    }
    init();
  </script>
</body>
</html>
