<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جودة الإعلانات — مرزوق أكاديمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Cairo', sans-serif; background: #f0f2f5; min-height: 100vh; }

    header {
      background: #1a1a1a; color: white;
      padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top));
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    header h1 { font-size: 16px; font-weight: 700; }
    .logout-btn, .back-btn {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 7px 14px; border-radius: 8px;
      font-family: 'Cairo', sans-serif; cursor: pointer; font-size: 13px; font-weight: 600;
      text-decoration: none;
    }

    .subnav {
      background: white; padding: 0 16px; display: flex; gap: 14px;
      overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #e5e7eb;
      position: sticky; top: 0; z-index: 50;
    }
    .subnav::-webkit-scrollbar { display: none; }
    .subnav a {
      padding: 12px 4px; text-decoration: none; font-size: 14px; font-weight: 700;
      color: #6b7280; border-bottom: 2px solid transparent; white-space: nowrap;
    }
    .subnav a.active { color: #1a1a1a; border-bottom-color: #e63329; }

    .container {
      padding: 14px; max-width: 1200px; margin: 0 auto;
    }

    /* Sync bar */
    .sync-bar {
      background: white; border-radius: 12px; padding: 10px 14px;
      margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05); flex-wrap: wrap; gap: 8px;
    }
    .sync-info { font-size: 12px; color: #6b7280; }
    .sync-info b { color: #1a1a1a; }
    .btn {
      padding: 8px 14px; border-radius: 8px; border: none;
      font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: #1a1a1a; color: white; }
    .btn-secondary { background: #f3f4f6; color: #1a1a1a; border: 1.5px solid #e5e7eb; }

    /* Date chips */
    .chips-row {
      display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
      margin-bottom: 10px; padding-bottom: 2px;
    }
    .chips-row::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 8px 14px; border-radius: 20px; background: white;
      color: #4b5563; font-size: 13px; font-weight: 700; cursor: pointer;
      border: 1.5px solid transparent; user-select: none;
    }
    .chip.active { background: #e63329; color: white; border-color: #e63329; }

    /* Summary tiles */
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;
      margin-bottom: 14px;
    }
    .sum-tile {
      background: white; border-radius: 12px; padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .sum-num { font-size: 26px; font-weight: 900; color: #1a1a1a; line-height: 1.1; }
    .sum-lbl { font-size: 12px; font-weight: 600; color: #6b7280; margin-top: 4px; }
    .sum-tile.primary .sum-num { color: #e63329; }
    .sum-tile.good .sum-num { color: #059669; }
    .sum-tile.info .sum-num { color: #2563eb; }

    /* Filters */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .filters select {
      padding: 8px 10px; border-radius: 8px; border: 1.5px solid #e5e7eb;
      font-family: 'Cairo', sans-serif; font-size: 13px; background: white;
    }

    /* View-mode + group-by control row */
    .view-controls {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      margin-bottom: 10px;
    }
    .view-controls .seg {
      display: inline-flex; background: white; border-radius: 10px; padding: 3px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .view-controls .seg button {
      padding: 7px 14px; border: none; background: transparent; border-radius: 7px;
      font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer;
      color: #6b7280;
    }
    .view-controls .seg button.active { background: #1a1a1a; color: white; }
    .view-controls .group-by-label {
      font-size: 12px; font-weight: 700; color: #6b7280;
    }

    /* Ad list — basic view */
    .ad-grid { display: flex; flex-direction: column; gap: 8px; }
    .ad-card {
      background: white; border-radius: 12px; padding: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      border-right: 5px solid #d1d5db;
      display: grid;
      grid-template-columns: minmax(220px, 1.6fr) auto auto;
      gap: 16px; align-items: center;
    }
    @media (max-width: 800px) {
      .ad-card { grid-template-columns: 1fr; gap: 10px; }
    }
    .ad-card.green { border-right-color: #10b981; }
    .ad-card.orange { border-right-color: #f59e0b; }
    .ad-card.red { border-right-color: #dc2626; }

    .ad-head { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .ad-name {
      font-size: 14px; font-weight: 800; color: #1a1a1a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ad-meta { display: flex; flex-wrap: wrap; gap: 4px; }
    .ad-meta .tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      background: #f3f4f6; color: #4b5563;
    }
    .ad-meta .tag.platform { background: #f3e8ff; color: #6b21a8; }
    .ad-meta .tag.variation { background: #ecfeff; color: #0e7490; }
    .ad-meta .tag.maturity-fresh { background: #dbeafe; color: #1e40af; }
    .ad-meta .tag.maturity-evaluating { background: #fef3c7; color: #92400e; }
    .ad-meta .tag.maturity-mature { background: #d1fae5; color: #065f46; }

    /* Kept for back-compat with any leftover code paths */
    .maturity-pill {
      font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 14px;
      flex-shrink: 0; white-space: nowrap;
    }
    .maturity-pill.fresh { background: #dbeafe; color: #1e40af; }
    .maturity-pill.evaluating { background: #fef3c7; color: #92400e; }
    .maturity-pill.mature { background: #d1fae5; color: #065f46; }

    .funnel {
      display: grid; grid-template-columns: repeat(4, 70px); gap: 6px;
    }
    .funnel-tile {
      background: #f9fafb; border-radius: 8px; padding: 6px 4px; text-align: center;
    }
    .funnel-num { font-size: 18px; font-weight: 900; color: #1a1a1a; line-height: 1.1; }
    .funnel-lbl { font-size: 10px; color: #6b7280; font-weight: 700; margin-top: 2px; }
    .funnel-tile.primary .funnel-num { color: #e63329; }
    .funnel-tile.good .funnel-num { color: #059669; }

    .rates-row {
      display: flex; gap: 14px; font-size: 11px; color: #6b7280;
      white-space: nowrap;
    }
    .rates-row b { color: #1a1a1a; font-size: 13px; }
    .rates-row .rate-rdv b { color: #e63329; }

    /* Advanced view — comparison table */
    .ad-table-wrap {
      background: white; border-radius: 12px; overflow: auto;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .ad-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 920px; }
    .ad-table th, .ad-table td {
      padding: 10px 12px; text-align: right; border-bottom: 1px solid #f3f4f6;
      white-space: nowrap;
    }
    .ad-table th {
      background: #f9fafb; color: #4b5563; font-weight: 700;
      cursor: pointer; user-select: none; position: sticky; top: 0;
    }
    .ad-table th:hover { color: #1a1a1a; background: #f3f4f6; }
    .ad-table th .sort-arrow { margin-right: 4px; opacity: 0.5; }
    .ad-table th.sort-active .sort-arrow { opacity: 1; color: #e63329; }
    .ad-table tr:hover td { background: #fafafa; }
    .ad-table td.name { font-weight: 700; color: #1a1a1a; max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
    .ad-table td.num  { font-weight: 800; color: #1a1a1a; text-align: center; font-variant-numeric: tabular-nums; }
    .ad-table td.pct  { font-weight: 800; text-align: center; font-variant-numeric: tabular-nums; }
    .ad-table td.pct.rdv { color: #e63329; }
    .ad-table tr.color-green td:first-child { border-right: 4px solid #10b981; }
    .ad-table tr.color-orange td:first-child { border-right: 4px solid #f59e0b; }
    .ad-table tr.color-red td:first-child { border-right: 4px solid #dc2626; }
    .ad-table .col-narrow { width: 70px; }
    .ad-table .platform-cell {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 8px;
      background: #f3e8ff; color: #6b21a8;
    }

    .empty {
      background: white; border-radius: 14px; padding: 40px; text-align: center;
      color: #9ca3af; font-weight: 600;
    }

    .toast {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      padding: 10px 18px; background: #1a1a1a; color: white;
      border-radius: 10px; font-size: 13px; font-weight: 700;
      z-index: 2000; opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #dc2626; }
    .toast.success { background: #059669; }
  </style>
</head>
<body>
  <header>
    <h1>جودة الإعلانات</h1>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </header>

  <nav class="subnav">
    <a href="dashboard.html">لوحة التحكم</a>
    <a href="agents.html">الوكلاء</a>
    <a href="leads.html">الرسائل</a>
    <a href="ads.html" class="active">جودة الإعلانات</a>
    <a href="lead-sources.html">مصادر الرسائل</a>
    <a href="spend.html">الإنفاق</a>
    <a href="settings.html">الإعدادات</a>
  </nav>

  <div class="container">
    <div class="sync-bar">
      <div class="sync-info">
        <span id="sourcesSummary">—</span>
        <span id="lastUpdated" style="margin-right:10px;color:#10b981;font-weight:700;"></span>
      </div>
      <div style="display:flex; gap: 6px;">
        <button class="btn btn-secondary" onclick="loadAds()" title="تحديث الأرقام الآن">🔄</button>
        <button class="btn btn-secondary" onclick="redistribute()">إعادة التوزيع</button>
        <button class="btn btn-primary" onclick="manualSync()">مزامنة الكل</button>
      </div>
    </div>

    <div class="chips-row" id="dateChips">
      <div class="chip active" data-range="all">الكل</div>
      <div class="chip" data-range="today">اليوم</div>
      <div class="chip" data-range="yesterday">أمس</div>
      <div class="chip" data-range="last3">آخر 3 أيام</div>
      <div class="chip" data-range="week">هذا الأسبوع</div>
      <div class="chip" data-range="month">هذا الشهر</div>
    </div>

    <div class="summary-grid">
      <div class="sum-tile"><div class="sum-num" id="sumLeads">0</div><div class="sum-lbl">إجمالي الرسائل</div></div>
      <div class="sum-tile primary"><div class="sum-num" id="sumRdv">0</div><div class="sum-lbl">مواعيد</div></div>
      <div class="sum-tile info"><div class="sum-num" id="sumVisits">0</div><div class="sum-lbl">زيارات</div></div>
      <div class="sum-tile good"><div class="sum-num" id="sumReg">0</div><div class="sum-lbl">مُسجلين</div></div>
    </div>

    <!-- View mode + group-by row -->
    <div class="view-controls">
      <div class="seg" id="viewModeSeg">
        <button data-mode="basic"    class="active">عرض بسيط</button>
        <button data-mode="advanced">عرض متقدم</button>
      </div>
      <span class="group-by-label">تجميع حسب:</span>
      <div class="seg" id="groupBySeg">
        <button data-group="ad"       class="active">الإعلان</button>
        <button data-group="adset">المجموعة (Adset)</button>
        <button data-group="campaign">الحملة</button>
        <button data-group="platform">المنصة</button>
      </div>
    </div>

    <div class="filters">
      <select id="filterScope">
        <option value="">كل النطاقات</option>
      </select>
      <select id="filterPlatform">
        <option value="">كل المنصات</option>
        <option value="fb">فيسبوك</option>
        <option value="ig">إنستغرام</option>
      </select>
      <select id="filterMaturity">
        <option value="">كل الأعمار</option>
        <option value="fresh">جديدة (<3 أيام)</option>
        <option value="evaluating">قيد التقييم (3-7)</option>
        <option value="mature">ناضجة (7+)</option>
      </select>
      <select id="filterColor">
        <option value="">كل الألوان</option>
        <option value="red">🔴 تحتاج مراجعة</option>
        <option value="orange">🟡 متوسط</option>
        <option value="green">🟢 جيد</option>
      </select>
    </div>

    <div class="ad-grid" id="adGrid"></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
const token = localStorage.getItem('token');
if (!token || localStorage.getItem('role') !== 'admin') { location.href = '/index.html'; }

// Default to "all" so admins see the full historical ad quality on open —
// previously-updated leads (RDV'd weeks ago, registered last month, etc.)
// stay visible. Narrower chips let them drill into a specific period.
let currentRange = 'all';
let allAds = [];

// View mode + group_by — persisted in localStorage so the admin's preferred
// drilldown level sticks across reloads.
let viewMode = localStorage.getItem('adsViewMode') || 'basic';   // basic | advanced
let groupBy  = localStorage.getItem('adsGroupBy')  || 'ad';      // ad | adset | campaign | platform
let advancedSort = { field: 'rdv_rate', dir: 'desc' };

const GROUP_LABEL = {
  ad: 'الإعلان', adset: 'مجموعة الإعلانات', campaign: 'الحملة', platform: 'المنصة',
};
const EMPTY_LABEL_BY_GROUP = {
  ad: '(بدون اسم)', adset: '(بدون مجموعة)', campaign: '(بدون حملة)', platform: '(غير محدد)',
};

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 2200);
}
function logout() { localStorage.clear(); location.href = '/index.html'; }

async function api(path, opts={}) {
  const headers = { 'Authorization': `Bearer ${token}`, ...(opts.headers||{}) };
  if (opts.body && typeof opts.body !== 'string') {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) { localStorage.clear(); location.href='/index.html'; return; }
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// Date chips
document.querySelectorAll('#dateChips .chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('#dateChips .chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    currentRange = c.dataset.range;
    loadAds();
  });
});

['filterScope','filterPlatform','filterMaturity','filterColor'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => { loadAds(); });
});

let allSources = [];

async function loadSources() {
  try {
    const d = await api('/ad-leads/admin/configs');
    allSources = d.configs || [];
    const enabled = allSources.filter(c => c.enabled);
    const totalRows = allSources.reduce((a, c) => a + (c.last_row_count || 0), 0);
    const latest = allSources
      .map(c => c.last_synced_at).filter(Boolean)
      .sort().reverse()[0];
    const lastLbl = latest ? new Date(latest).toLocaleString('ar-MA') : '—';
    document.getElementById('sourcesSummary').innerHTML =
      `📊 <b>${enabled.length}</b> مصدر مفعّل • <b>${totalRows}</b> صف في المجموع • آخر مزامنة: <b>${lastLbl}</b>`;

    const sel = document.getElementById('filterScope');
    sel.innerHTML = '<option value="">كل النطاقات</option>' +
      allSources.map(c =>
        `<option value="${c.scope_type}:${c.scope_id}">${c.scope_type === 'city' ? '🏙️' : '🏢'} ${escapeHtml(c.scope_label || '')} — ${escapeHtml(c.name)}</option>`
      ).join('');
  } catch (e) {}
}

async function manualSync() {
  toast('جاري المزامنة...');
  try {
    const r = await api('/ad-leads/admin/sync-all', { method: 'POST' });
    const total = (r.configs || []).reduce((a, c) => a + (c.inserted || 0), 0);
    const moved = (r.configs || []).reduce((a, c) => a + (c.assigned || 0), 0);
    toast(`تم: ${total} جديد، ${moved} موزّع`, 'success');
    loadSources();
    loadAds();
  } catch (e) { toast('خطأ: ' + e.message, 'error'); }
}

async function redistribute() {
  try {
    const r = await api('/ad-leads/redistribute', { method: 'POST' });
    toast(`تم توزيع ${r.assigned || 0} رسالة`, 'success');
    loadAds();
  } catch (e) { toast('فشل التوزيع', 'error'); }
}

async function loadAds() {
  try {
    const scopeVal = document.getElementById('filterScope').value;
    const params = new URLSearchParams({ range: currentRange, group_by: groupBy });
    if (scopeVal) {
      const [st, sid] = scopeVal.split(':');
      params.set('scope_type', st);
      params.set('scope_id', sid);
    }
    // cache-busting timestamp so the browser never reuses a stale response —
    // the page should feel live every time an agent updates a status.
    params.set('_t', Date.now().toString());
    const d = await api(`/ad-leads/admin/ad-quality?${params.toString()}`);
    allAds = d.ads || [];
    lastTotals = d.totals || null;
    lastLoadedAt = new Date();
    render();
    updateLastUpdated();
  } catch (e) { toast('تعذر تحميل الإعلانات', 'error'); }
}

// View-mode + group-by segmented toggles
document.querySelectorAll('#viewModeSeg button').forEach(b => {
  b.addEventListener('click', () => {
    viewMode = b.dataset.mode;
    localStorage.setItem('adsViewMode', viewMode);
    document.querySelectorAll('#viewModeSeg button').forEach(x =>
      x.classList.toggle('active', x.dataset.mode === viewMode)
    );
    render();  // no refetch — same data, different layout
  });
});
document.querySelectorAll('#groupBySeg button').forEach(b => {
  b.addEventListener('click', () => {
    groupBy = b.dataset.group;
    localStorage.setItem('adsGroupBy', groupBy);
    document.querySelectorAll('#groupBySeg button').forEach(x =>
      x.classList.toggle('active', x.dataset.group === groupBy)
    );
    loadAds();  // bucket key changes server-side — refetch
  });
});

// Restore the persisted view mode + group-by on page load
function applyToggleStateFromStorage() {
  document.querySelectorAll('#viewModeSeg button').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === viewMode)
  );
  document.querySelectorAll('#groupBySeg button').forEach(b =>
    b.classList.toggle('active', b.dataset.group === groupBy)
  );
}
applyToggleStateFromStorage();

function pct(v) { return (v*100).toFixed(0) + '%'; }

let lastTotals = null;
let lastLoadedAt = null;

function updateLastUpdated() {
  const el = document.getElementById('lastUpdated');
  if (!el || !lastLoadedAt) return;
  const t = lastLoadedAt;
  const hh = String(t.getHours()).padStart(2,'0');
  const mm = String(t.getMinutes()).padStart(2,'0');
  const ss = String(t.getSeconds()).padStart(2,'0');
  el.textContent = `آخر تحديث: ${hh}:${mm}:${ss}`;
}

function render() {
  const fp = document.getElementById('filterPlatform').value;
  const fm = document.getElementById('filterMaturity').value;
  const fc = document.getElementById('filterColor').value;

  const ads = allAds.filter(a =>
    (!fp || (a.platform || '').toLowerCase() === fp) &&
    (!fm || a.maturity === fm) &&
    (!fc || a.color === fc)
  );

  // summary — use cumulative funnel counts straight from the backend totals
  // so the numbers match what the cards show.
  const t = lastTotals || {
    leads: allAds.reduce((s,a)=>s+a.leads,0),
    rdv: allAds.reduce((s,a)=>s+(a.rdv_count||0),0),
    visits: allAds.reduce((s,a)=>s+(a.visits_count||0),0),
    registered: allAds.reduce((s,a)=>s+(a.registered_count||0),0),
  };
  document.getElementById('sumLeads').textContent  = t.leads || 0;
  document.getElementById('sumRdv').textContent    = t.rdv || 0;
  document.getElementById('sumVisits').textContent = t.visits || 0;
  document.getElementById('sumReg').textContent    = t.registered || 0;

  const grid = document.getElementById('adGrid');

  // Diagnostic banner: every lead bucketed into the empty bucket for the
  // current group_by almost always means the corresponding sheet column
  // isn't mapped (or doesn't exist). Surface that with a link to fix.
  const emptyLabel = EMPTY_LABEL_BY_GROUP[groupBy] || '(بدون اسم)';
  const onlyUnnamed = allAds.length === 1 && allAds[0].ad_name === emptyLabel;
  let banner = '';
  if (onlyUnnamed && allAds[0].leads > 0) {
    banner = `<div class="empty" style="background:#fef3c7;color:#92400e;border:1.5px dashed #fbbf24;text-align:right;padding:14px;border-radius:12px;margin-bottom:10px;">
      ⚠️ الرسائل لا تحمل ${escapeHtml(GROUP_LABEL[groupBy])}. افتح <a href="lead-sources.html" style="color:#92400e;font-weight:800;text-decoration:underline;">مصادر الرسائل</a> وأضف العمود المناسب إلى إعدادات المصدر، أو سيقوم النظام بالكشف التلقائي إذا كان الاسم المعتاد موجوداً في الجدول.
    </div>`;
  }

  if (!ads.length) {
    grid.innerHTML = banner + '<div class="empty">لا توجد بيانات في هذه الفترة. اضغط "مزامنة الكل" لتحميل البيانات من Google Sheet.</div>';
    return;
  }

  if (viewMode === 'advanced') {
    grid.innerHTML = banner + renderAdvancedTable(ads);
    wireAdvancedTableSort();
  } else {
    grid.innerHTML = banner + ads.map(renderBasicRow).join('');
  }
}

function renderBasicRow(a) {
  const matLbl = { fresh: 'جديد', evaluating: 'قيد التقييم', mature: 'ناضج' }[a.maturity] || '';
  const tags = [];
  if (a.platform) tags.push(`<span class="tag platform">${escapeHtml(a.platform.toUpperCase())}</span>`);
  if (matLbl)     tags.push(`<span class="tag maturity-${a.maturity}">${matLbl} · ${a.age_days}ي</span>`);
  // Variation tags — only meaningful when grouping above the ad level
  if (groupBy === 'adset' && a.ad_count > 1) {
    tags.push(`<span class="tag variation">${a.ad_count} إعلان</span>`);
  } else if (groupBy === 'campaign') {
    if (a.adset_count > 1) tags.push(`<span class="tag variation">${a.adset_count} مجموعة</span>`);
    if (a.ad_count > 1)    tags.push(`<span class="tag variation">${a.ad_count} إعلان</span>`);
  } else if (groupBy === 'platform') {
    if (a.adset_count > 0) tags.push(`<span class="tag variation">${a.adset_count} مجموعة</span>`);
    if (a.ad_count > 0)    tags.push(`<span class="tag variation">${a.ad_count} إعلان</span>`);
  }

  const rdvN = a.rdv_count ?? a.rdv ?? 0;
  const visN = a.visits_count ?? a.visits ?? 0;
  const regN = a.registered_count ?? a.registered ?? 0;
  return `
    <div class="ad-card ${a.color}">
      <div class="ad-head">
        <div class="ad-name" title="${escapeAttr(a.ad_name)}">${escapeHtml(a.ad_name)}</div>
        ${tags.length ? `<div class="ad-meta">${tags.join('')}</div>` : ''}
      </div>
      <div class="funnel">
        <div class="funnel-tile"><div class="funnel-num">${a.leads}</div><div class="funnel-lbl">رسائل</div></div>
        <div class="funnel-tile primary"><div class="funnel-num">${rdvN}</div><div class="funnel-lbl">مواعيد</div></div>
        <div class="funnel-tile"><div class="funnel-num">${visN}</div><div class="funnel-lbl">زيارات</div></div>
        <div class="funnel-tile good"><div class="funnel-num">${regN}</div><div class="funnel-lbl">مسجلين</div></div>
      </div>
      <div class="rates-row">
        <div class="rate-rdv">RDV: <b>${pct(a.rdv_rate)}</b></div>
        <div>Show: <b>${pct(a.show_rate)}</b></div>
        <div>Close: <b>${pct(a.close_rate)}</b></div>
        <div>Reg: <b>${pct(a.registered_rate)}</b></div>
      </div>
    </div>`;
}

// ── Advanced comparison table ─────────────────────────────────────────
const ADV_COLS = [
  { key: 'ad_name',          label: 'الاسم',           type: 'name',   sortable: true,  cls: 'name' },
  { key: 'platform',         label: 'المنصة',          type: 'plat',   sortable: true,  cls: 'platform' },
  { key: 'leads',            label: 'رسائل',           type: 'num',    sortable: true,  cls: 'num col-narrow' },
  { key: 'rdv_count',        label: 'مواعيد',          type: 'num',    sortable: true,  cls: 'num col-narrow' },
  { key: 'visits_count',     label: 'زيارات',          type: 'num',    sortable: true,  cls: 'num col-narrow' },
  { key: 'registered_count', label: 'مُسجلين',          type: 'num',    sortable: true,  cls: 'num col-narrow' },
  { key: 'rdv_rate',         label: 'RDV %',          type: 'pct',    sortable: true,  cls: 'pct rdv col-narrow' },
  { key: 'show_rate',        label: 'Show %',         type: 'pct',    sortable: true,  cls: 'pct col-narrow' },
  { key: 'close_rate',       label: 'Close %',        type: 'pct',    sortable: true,  cls: 'pct col-narrow' },
  { key: 'registered_rate',  label: 'Reg %',          type: 'pct',    sortable: true,  cls: 'pct col-narrow' },
  { key: 'age_days',         label: 'العمر',           type: 'num',    sortable: true,  cls: 'num col-narrow' },
];

function getVariationCols() {
  // Show the variation-count column only when it adds info
  if (groupBy === 'campaign') {
    return [
      { key: 'adset_count', label: 'مجموعات',  type: 'num', sortable: true, cls: 'num col-narrow' },
      { key: 'ad_count',    label: 'إعلانات',  type: 'num', sortable: true, cls: 'num col-narrow' },
    ];
  }
  if (groupBy === 'adset') {
    return [{ key: 'ad_count', label: 'إعلانات', type: 'num', sortable: true, cls: 'num col-narrow' }];
  }
  if (groupBy === 'platform') {
    return [
      { key: 'campaign_count', label: 'حملات',  type: 'num', sortable: true, cls: 'num col-narrow' },
      { key: 'adset_count',    label: 'مجموعات', type: 'num', sortable: true, cls: 'num col-narrow' },
      { key: 'ad_count',       label: 'إعلانات', type: 'num', sortable: true, cls: 'num col-narrow' },
    ];
  }
  return [];
}

function renderAdvancedTable(ads) {
  const cols = ADV_COLS.concat(getVariationCols());
  const sorted = [...ads].sort((a, b) => {
    const f = advancedSort.field, dir = advancedSort.dir === 'asc' ? 1 : -1;
    const av = a[f] ?? 0, bv = b[f] ?? 0;
    if (typeof av === 'string' || typeof bv === 'string') {
      return dir * String(av).localeCompare(String(bv), 'ar');
    }
    return dir * (av - bv);
  });

  const head = cols.map(c => {
    const active = advancedSort.field === c.key ? 'sort-active' : '';
    const arrow = advancedSort.field === c.key
      ? (advancedSort.dir === 'asc' ? '▲' : '▼')
      : '↕';
    return `<th data-sort="${c.key}" class="${active}">${escapeHtml(c.label)} <span class="sort-arrow">${arrow}</span></th>`;
  }).join('');

  const body = sorted.map(a => {
    return '<tr class="color-' + (a.color || 'red') + '">' + cols.map(c => {
      const v = a[c.key];
      if (c.type === 'pct') return `<td class="${c.cls}">${pct(v || 0)}</td>`;
      if (c.type === 'num') return `<td class="${c.cls}">${v ?? 0}</td>`;
      if (c.type === 'plat') return `<td class="${c.cls}">${v ? `<span class="platform-cell">${escapeHtml(String(v).toUpperCase())}</span>` : '—'}</td>`;
      // name
      return `<td class="${c.cls}" title="${escapeAttr(v || '')}">${escapeHtml(v || '—')}</td>`;
    }).join('') + '</tr>';
  }).join('');

  return `
    <div class="ad-table-wrap">
      <table class="ad-table">
        <thead><tr>${head}</tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>`;
}

function wireAdvancedTableSort() {
  document.querySelectorAll('.ad-table th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const f = th.dataset.sort;
      if (advancedSort.field === f) {
        advancedSort.dir = advancedSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        advancedSort.field = f;
        // Numeric/percent columns default to desc (highest first); name col asc.
        advancedSort.dir = (f === 'ad_name' || f === 'platform') ? 'asc' : 'desc';
      }
      render();
    });
  });
}

function escapeAttr(s) { return (s||'').toString().replace(/"/g, '&quot;'); }

function escapeHtml(s) { return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Auto-refresh every 30s while the page is visible — keeps the ad quality
// view live as agents update statuses, without requiring a manual reload.
const AUTO_REFRESH_MS = 30000;
let autoRefreshTimer = null;
function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(() => {
    if (document.visibilityState === 'visible') loadAds();
  }, AUTO_REFRESH_MS);
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadAds();
});

(async function() {
  await loadSources();
  loadAds();
  startAutoRefresh();
})();
</script>
</body>
