<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>القائمة السوداء — مرزوق أكاديمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f0f4f8; min-height: 100vh; }
    header { background: #1e3a8a; color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 8px; font-family: 'Cairo', sans-serif; cursor: pointer; }
    .container { padding: 20px; max-width: 800px; margin: 0 auto; }
    .add-form { background: white; border-radius: 12px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .add-form h2 { margin-bottom: 16px; font-size: 16px; }
    input { width: 100%; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 15px; font-family: 'Cairo', sans-serif; margin-bottom: 10px; }
    input:focus { outline: none; border-color: #1e3a8a; }
    .btn-add { width: 100%; background: #dc2626; color: white; border: none; border-radius: 8px; padding: 12px; font-family: 'Cairo', sans-serif; font-size: 15px; cursor: pointer; font-weight: 700; }
    .black-row { background: white; border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-right: 4px solid #dc2626; }
    .phone { font-weight: 700; font-size: 16px; direction: ltr; }
    .reason { font-size: 12px; color: #6b7280; }
    .btn-remove { background: #fef2f2; color: #dc2626; border: 2px solid #fecaca; border-radius: 8px; padding: 8px 14px; font-family: 'Cairo', sans-serif; cursor: pointer; }
    .section-title { font-size: 16px; font-weight: 700; color: #374151; margin: 0 0 12px; }
  </style>
</head>
<body>
  <header>
    <h1>القائمة السوداء</h1>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">← رجوع</button>
  </header>

  <div class="container">
    <div class="add-form">
      <h2>إضافة رقم للقائمة السوداء</h2>
      <input type="text" id="phone" placeholder="رقم الهاتف" dir="ltr" />
      <input type="text" id="reason" placeholder="السبب (اختياري)" />
      <button class="btn-add" onclick="addToBlacklist()">🚫 إضافة للقائمة السوداء</button>
    </div>

    <div class="section-title">الأرقام المحظورة</div>
    <div id="blacklist"></div>
  </div>

  <script>
    const API = window.location.origin;
    const token = localStorage.getItem('token');
    if (!token || localStorage.getItem('role') !== 'admin') window.location.href = '/index.html';

    async function loadBlacklist() {
      const res = await fetch(`${API}/blacklist/`, { headers: { Authorization: `Bearer ${token}` } });
      const items = await res.json();
      const list = document.getElementById('blacklist');
      list.innerHTML = '';

      if (!items.length) {
        list.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:20px">لا توجد أرقام محظورة</p>';
        return;
      }

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'black-row';
        div.innerHTML = `
          <div>
            <div class="phone">${item.phone}</div>
            <div class="reason">${item.reason || 'بدون سبب'}</div>
          </div>
          <button class="btn-remove" onclick="removeFromBlacklist('${item.id}')">حذف</button>
        `;
        list.appendChild(div);
      });
    }

    async function addToBlacklist() {
      const phone = document.getElementById('phone').value.trim();
      const reason = document.getElementById('reason').value.trim();
      if (!phone) return alert('أدخل رقم الهاتف');

      const res = await fetch(`${API}/blacklist/`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, reason })
      });
      if (res.ok) {
        document.getElementById('phone').value = '';
        document.getElementById('reason').value = '';
        loadBlacklist();
      }
    }

    async function removeFromBlacklist(id) {
      if (!confirm('هل تريد حذف هذا الرقم من القائمة السوداء؟')) return;
      await fetch(`${API}/blacklist/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      loadBlacklist();
    }

    loadBlacklist();
  </script>
</body>
</html>
