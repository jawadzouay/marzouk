<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طلب إنشاء حساب — مرزوق أكاديمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d1a1a 50%, #1a1a1a 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: white; border-radius: 20px; padding: 40px 32px;
      width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo img { width: 160px; max-width: 100%; height: auto; margin-bottom: 8px; }
    .logo h2 { font-size: 18px; color: #1a1a1a; margin-bottom: 4px; }
    .logo p { color: #6b7280; font-size: 13px; }
    label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input, select {
      width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px;
      font-size: 16px; font-family: 'Cairo', sans-serif; direction: rtl; margin-bottom: 20px; transition: border 0.2s;
      background: white;
    }
    input:focus, select:focus { outline: none; border-color: #e63329; }
    select:disabled { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; }
    .btn-submit {
      width: 100%; padding: 14px; background: #e63329; color: white; border: none;
      border-radius: 10px; font-size: 18px; font-family: 'Cairo', sans-serif;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .btn-submit:hover { background: #c82a22; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .back-link { text-align: center; margin-top: 16px; font-size: 14px; color: #6b7280; }
    .back-link a { color: #e63329; text-decoration: none; font-weight: 600; }
    .alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .success-box { text-align: center; padding: 20px 0; }
    .success-icon { font-size: 60px; margin-bottom: 12px; }
    .success-box h3 { font-size: 18px; color: #166534; margin-bottom: 8px; }
    .success-box p { color: #6b7280; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logo.png" alt="Marzouk Academy" />
      <h2>طلب إنشاء حساب</h2>
      <p>اختر اسمك وكلمة المرور، سيتم مراجعة طلبك من قِبَل الإدارة</p>
    </div>

    <div id="alert"></div>

    <div id="form-section">
      <form id="register-form">
        <label>اسم المستخدم</label>
        <input type="text" id="req-name" placeholder="أدخل اسمك" required autocomplete="username" />
        <label>المدينة</label>
        <select id="req-city" required>
          <option value="">— اختر المدينة —</option>
        </select>
        <label>الفرع</label>
        <select id="req-branch" required disabled>
          <option value="">— اختر المدينة أولاً —</option>
        </select>
        <label>كلمة المرور</label>
        <input type="password" id="req-password" placeholder="اختر كلمة مرور" required autocomplete="new-password" />
        <label>تأكيد كلمة المرور</label>
        <input type="password" id="req-confirm" placeholder="أعد إدخال كلمة المرور" required autocomplete="new-password" />
        <button type="submit" class="btn-submit" id="submit-btn">إرسال الطلب</button>
      </form>
      <div class="back-link">لديك حساب؟ <a href="/index.html">تسجيل الدخول</a></div>
    </div>

    <div id="success-section" style="display:none">
      <div class="success-box">
        <div class="success-icon">⏳</div>
        <h3>تم إرسال طلبك!</h3>
        <p>سيتم مراجعة طلبك من قِبَل الإدارة.<br>بعد الموافقة يمكنك تسجيل الدخول باستخدام اسمك وكلمة المرور.</p>
      </div>
      <div class="back-link" style="margin-top:20px"><a href="/index.html">العودة لتسجيل الدخول</a></div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let allBranches = [];

    const citySel   = document.getElementById('req-city');
    const branchSel = document.getElementById('req-branch');

    async function loadBranches() {
      try {
        const res = await fetch(`${API}/branches/public`);
        allBranches = await res.json();
        const cities = Array.from(new Set(allBranches.map(b => b.city).filter(Boolean))).sort();
        citySel.innerHTML = '<option value="">— اختر المدينة —</option>' +
          cities.map(c => `<option value="${c}">${c}</option>`).join('');
      } catch (e) {
        document.getElementById('alert').innerHTML =
          '<div class="alert alert-error">تعذّر تحميل قائمة الفروع</div>';
      }
    }

    citySel.addEventListener('change', () => {
      const city = citySel.value;
      if (!city) {
        branchSel.innerHTML = '<option value="">— اختر المدينة أولاً —</option>';
        branchSel.disabled = true;
        return;
      }
      const filtered = allBranches.filter(b => b.city === city);
      branchSel.innerHTML = '<option value="">— اختر الفرع —</option>' +
        filtered.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
      branchSel.disabled = false;
    });

    loadBranches();

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('req-name').value.trim();
      const city     = citySel.value;
      const branchId = branchSel.value;
      const password = document.getElementById('req-password').value;
      const confirm  = document.getElementById('req-confirm').value;
      const alertEl  = document.getElementById('alert');
      const btn      = document.getElementById('submit-btn');

      alertEl.innerHTML = '';

      if (!name || !password) {
        alertEl.innerHTML = '<div class="alert alert-error">يرجى ملء جميع الحقول</div>';
        return;
      }
      if (!city || !branchId) {
        alertEl.innerHTML = '<div class="alert alert-error">يرجى اختيار المدينة والفرع</div>';
        return;
      }
      if (password !== confirm) {
        alertEl.innerHTML = '<div class="alert alert-error">كلمتا المرور غير متطابقتين</div>';
        return;
      }
      if (password.length < 4) {
        alertEl.innerHTML = '<div class="alert alert-error">كلمة المرور يجب أن تكون 4 أحرف على الأقل</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'جاري الإرسال...';

      try {
        const res = await fetch(`${API}/auth/register-request`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ requested_name: name, password, city, branch_id: branchId })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'خطأ في الإرسال');
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
      } catch (err) {
        alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'إرسال الطلب';
      }
    });
  </script>
</body>
</html>
